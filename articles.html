<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>บทความ — DogBooster</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #F0B74C; --gold-dark: #E0A02F;
    --dark: #15130F; --dark2: #1C1A15; --dark3: #3A352D;
    --cream: #FAF7F1; --sand: #E7E2D7; --muted: #A39B8C; --text-body: #48433A;
    --amber: #B8860B;
  }
  html, body {
    font-family: 'LINE Seed Sans TH', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; background: var(--sand); min-height: 100dvh;
  }
  .page { max-width: 430px; margin: 0 auto; min-height: 100dvh; background: var(--cream); }
  .header {
    background: var(--dark); padding: 52px 22px 26px; position: relative; overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top: -60px; right: -40px; width: 240px; height: 240px;
    border-radius: 50%; background: radial-gradient(circle, rgba(240,183,76,.18), transparent 70%);
  }
  .back-btn {
    background: none; border: none; cursor: pointer; color: var(--cream);
    display: flex; align-items: center; gap: 8px; font-family: inherit; font-size: 14px;
    font-weight: 700; padding: 0; margin-bottom: 18px; position: relative;
  }
  .back-btn svg { width: 20px; height: 20px; }
  .header h1 { font-size: 24px; font-weight: 800; color: var(--cream); position: relative; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 6px; position: relative; }
  .cat-bar {
    display: flex; gap: 8px; overflow-x: auto; padding: 16px 20px 4px;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-chip {
    flex-shrink: 0; background: var(--sand); color: var(--text-body);
    border: 1.5px solid transparent; border-radius: 100px;
    font-family: inherit; font-size: 13px; font-weight: 800; padding: 8px 16px;
    cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .cat-chip.active { background: var(--dark); color: var(--gold); }
  .body { padding: 8px 20px 60px; display: flex; flex-direction: column; gap: 14px; }
  .article-card {
    background: var(--sand); border-radius: 16px; overflow: hidden; display: block;
    text-decoration: none; color: inherit;
  }
  .article-card img { width: 100%; height: 180px; object-fit: cover; display: block; background: var(--dark2); }
  .article-card .body-txt { padding: 14px 16px; }
  .article-tag {
    display: inline-block; font-size: 11px; font-weight: 800; color: var(--amber);
    letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px;
  }
  .article-title { font-size: 16px; font-weight: 800; color: var(--dark); line-height: 1.4; }
  .article-excerpt { font-size: 13px; color: var(--text-body); line-height: 1.6; margin-top: 6px; }
  .article-date { font-size: 12px; color: var(--muted); margin-top: 8px; font-weight: 700; }
  .empty-state { text-align: center; padding: 48px 16px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; font-weight: 600; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <button class="back-btn" onclick="history.back()">
      <i data-lucide="arrow-left"></i> กลับ
    </button>
    <h1>บทความ</h1>
    <p>ความรู้และเคล็ดลับการฝึกสุนัขจาก DogBooster</p>
  </div>

  <div class="cat-bar" id="catBar"></div>
  <div class="body" id="articleList"></div>
</div>
<script>
  // ── หมวดหมู่ ── (เพิ่มหมวดได้ที่นี่)
  var CATEGORIES = ['ทั้งหมด', 'ฝึกสุนัข', 'Puppy', 'ก้าวร้าว'];

  // ── บทความ ── (เพิ่มบทความใหม่โดยเติมออบเจกต์ในลิสต์นี้)
  var ARTICLES = [
    {
      category: 'ฝึกสุนัข',
      url: 'article-iyc.html',
      image: 'assets/article-iyc.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: 'ทำไม “การเลือก” ถึงเป็นกุญแจสำคัญที่สุดในการสร้างสุนัขที่ยอดเยี่ยม',
      excerpt: 'ItsYerChoice (IYC) เกมที่เปลี่ยนกระบวนการคิดของสุนัข ให้เรียนรู้ที่จะควบคุมตนเอง แทนที่จะถูกควบคุมจากภายนอก'
    },
    {
      category: 'ฝึกสุนัข',
      url: 'article-grow-together.html',
      image: 'assets/article-grow-together.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: 'ไม่ใช่ควบคุม แต่เติบโตไปด้วยกัน',
      excerpt: 'ช่วงวัยลูกหมาคือช่วงที่หัวใจของเขาเปิดรับเรามากที่สุด — เริ่มฝึกแบบ Force-Free Shaping ตั้งแต่วันนี้'
    },
    {
      category: 'ฝึกสุนัข',
      url: 'article-brain.html',
      image: 'assets/article-brain.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: '🧠 ส่องสมองน้องหมา ความลับเบื้องหลังสัญชาตญาณและความฉลาด',
      excerpt: 'ทำความรู้จักสมองส่วนหน้า–ส่วนหลัง และพฤติกรรมตามสัญชาตญาณ เพื่อฝึกให้ถูกต้องถึงระดับสมอง'
    },
    {
      category: 'ฝึกสุนัข',
      url: 'article-play.html',
      image: 'assets/article-play.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: 'การเล่นคือการฝึก… และการฝึกคือการเล่น',
      excerpt: 'เปลี่ยนจาก “ต้องทำ” เป็น “อยากทำ” ด้วยการเสริมแรงทางบวก สร้างนิสัยดีจากความสุขที่มีคุณค่า'
    },
    {
      category: 'ฝึกสุนัข',
      url: 'article-fear-understand.html',
      image: 'assets/article-fear-understand.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: 'หมาทำเพราะ “เข้าใจ” หรือทำเพราะ “กลัว”',
      excerpt: 'เปรียบเทียบหมาที่ทำเพราะกลัว vs หมาที่ทำเพราะเข้าใจ — สร้างนักคิดที่เลือกทำสิ่งที่ถูกต้องด้วยตัวเอง'
    },
    {
      category: 'ฝึกสุนัข',
      url: 'article-reward.html',
      image: 'assets/article-reward.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: 'ฝึกด้วย “ใจ” ได้ผลไกลกว่าที่คิด (Reward-Based)',
      excerpt: 'Reward-Based ไม่ใช่แค่ป้อนขนม แต่คือการสร้างคุณค่า ความเชื่อใจ และให้สุนัขได้เลือกด้วยตัวเอง'
    },
    {
      category: 'ฝึกสุนัข',
      url: 'article-bigdog.html',
      image: 'assets/article-biggog.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: 'หมาตัวใหญ่แรงเยอะ จัดการยังไง',
      excerpt: 'ทำไมสายรัดคออาจทำร้ายเขา และวิธีฝึกเดินสวยด้วย front-clip harness ไม่ลาก ไม่เจ็บทั้งคู่'
    },
    {
      category: 'ฝึกสุนัข',
      url: 'article-daily.html',
      image: 'assets/article-daily.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: 'เราฝึกหมาทุกวัน โดยไม่รู้ตัว',
      excerpt: 'นิสัยของหมาถูกปั้นจากสิ่งเล็ก ๆ รอบตัวในทุกวัน — มาเรียนภาษาที่หมาฟังแล้วเข้าใจจริง ๆ'
    },
    {
      category: 'ฝึกสุนัข',
      url: 'article-self-train.html',
      image: 'assets/article-self-train.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: 'ทำไมต้องฝึกหมาด้วยตัวเอง',
      excerpt: 'ผลลัพธ์ไม่สำคัญเท่าระหว่างทางที่เราอยู่กับเค้า — มีแค่พ่อแม่เท่านั้นที่จะหล่อหลอมน้องได้จริง'
    },
    {
      category: 'ฝึกสุนัข',
      url: 'article-any-age.html',
      image: 'assets/article-any-age.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: 'ฝึกหมาอายุเยอะได้มั้ย?',
      excerpt: 'หมาเรียนรู้ได้ตลอดชีวิต ไม่มีคำว่าสายเกินไป — สิ่งที่เขาต้องการคือโอกาสและความเข้าใจจากเรา'
    },
    {
      category: 'ฝึกสุนัข',
      url: 'article-two-years.html',
      image: 'assets/article-two-years.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: 'สุนัขเริ่มมี “ตัวตนที่ชัดเจน” ช่วงวัย 2 ปี',
      excerpt: 'วัย 2 ปีคือช่วงโตเต็มวัย มีบุคลิกเฉพาะตัว — แต่การฝึกไม่ใช่เรื่องของอายุ แต่คือ “วิธี” และ “ความเข้าใจ”'
    },
    {
      category: 'ฝึกสุนัข',
      url: 'article-want-learn.html',
      image: 'assets/article-want-learn.jpg',
      tag: '🐾 การฝึกสุนัข',
      title: 'ก่อนสอนคำสั่ง… ทำให้เขา “อยากเรียน” ก่อน',
      excerpt: '5 ข้อดีของการทำให้สุนัข “อยากฝึก” มากกว่าการบังคับ — เรียนเร็วขึ้น เครียดน้อยลง และยั่งยืนกว่า'
    },
    {
      category: 'Puppy',
      url: 'article-puppy-pee.html',
      image: 'assets/article-puppy-pee.jpg',
      tag: '🐶 Puppy',
      title: 'ทำไมลูกสุนัขถึงปัสสาวะเมื่อดีใจหรือตื่นเต้น? และเราจะช่วยเขาได้อย่างไร',
      excerpt: 'ไม่ใช่ปัญหาการฝึก แต่เป็น “การตอบสนองทางอารมณ์” — เข้าใจสาเหตุและวิธีช่วยสร้างความมั่นใจให้ลูกสุนัข'
    }
  ];

  var activeCat = 'ทั้งหมด';

  function renderCats() {
    document.getElementById('catBar').innerHTML = CATEGORIES.map(function(c) {
      return '<button class="cat-chip' + (c === activeCat ? ' active' : '') +
        '" onclick="selectCat(\'' + c + '\')">' + c + '</button>';
    }).join('');
  }

  function selectCat(c) { activeCat = c; renderCats(); renderArticles(); }

  function renderArticles() {
    var list = ARTICLES.filter(function(a) {
      return activeCat === 'ทั้งหมด' || a.category === activeCat;
    });
    var el = document.getElementById('articleList');
    if (list.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>ยังไม่มีบทความในหมวดนี้</p></div>';
      return;
    }
    el.innerHTML = list.map(function(a) {
      return '<a href="' + a.url + '" class="article-card">' +
        '<img src="' + a.image + '" alt="' + a.title + '" loading="lazy">' +
        '<div class="body-txt">' +
          '<span class="article-tag">' + a.tag + '</span>' +
          '<div class="article-title">' + a.title + '</div>' +
          '<div class="article-excerpt">' + a.excerpt + '</div>' +
        '</div>' +
      '</a>';
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', function() {
    function init() {
      if (window.lucide && window.lucide.createIcons) {
        renderCats(); renderArticles(); window.lucide.createIcons();
      } else { setTimeout(init, 80); }
    }
    init();
  });
</script>
</body>
</html>
