  <script type="application/json" id="type-data">{"ESCA": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">⭐</span> Social Energizer</div>\n              </div>\n              <!-- illustration -->\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <!-- name -->\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">ESCA</div>\n                <h2 style=\"font-size:28px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.05\">THE SUPERSTAR</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:2px\">นักผจญภัยดาวเด่น</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ชีวิตมีไว้เพื่อออกไปใช้ และโลกมีไว้เพื่อค้นพบ\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <!-- overview -->\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">ESCA คือสุนัขที่มีพลังงานสูง มั่นใจ เข้าสังคมเก่ง และพร้อมเผชิญกับทุกประสบการณ์ใหม่ พวกเขามักทำให้คนรอบข้างยิ้มได้เสมอ เพราะเต็มไปด้วยความกระตือรือร้น ความสนุก และความกล้าที่จะลองสิ่งใหม่</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"compass\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เข้าสถานที่ใหม่ — เป็นตัวแรกที่ออกสำรวจ</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"users\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เจอคนใหม่ — เป็นตัวแรกที่เข้าไปทัก</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"zap\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">มีกิจกรรมใหม่ — เป็นตัวแรกที่พร้อมลงมือ</span></div>\n              </div>\n\n              <!-- worldview -->\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:19px;font-weight:800;color:#F0B74C;line-height:1.3\">\"โลกเต็มไปด้วยโอกาส\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">ตอบสนองต่อสิ่งใหม่ด้วยความตื่นเต้นมากกว่าความกังวล สำหรับ ESCA การค้นพบสิ่งใหม่คือรางวัลในตัวเอง</p>\n              </div>\n\n              <!-- strengths / watchouts -->\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>มั่นใจ</div><div>กล้าลองสิ่งใหม่</div><div>เรียนรู้เร็ว</div><div>ฟื้นตัวจากความเครียดได้ดี</div><div>ปรับตัวเก่ง</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>สมาธิสั้นเมื่อมีสิ่งเร้า</div><div>ตื่นเต้นเกินไป</div><div>ควบคุมอารมณ์ยาก</div><div>ดึงสายจูง</div><div>พุ่งเข้าหาสิ่งที่สนใจ</div>\n                  </div>\n                </div>\n              </div>\n\n              <!-- under stress -->\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">ESCA มักไม่ถอยหนี แต่แสดงออกด้วยการเพิ่มระดับพลังงาน — วิ่งมากขึ้น เห่ามากขึ้น กระโดดมากขึ้น และควบคุมตัวเองยากขึ้น</p>\n              </div>\n\n              <!-- ideal owner -->\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ชอบทำกิจกรรม</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">มีเวลาใช้ชีวิตร่วมกัน</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">สนุกกับการเรียนรู้</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เป็นผู้นำที่มั่นคง</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ ESCA ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">ESCA มีความกล้า พลังงาน และความมั่นใจ พร้อมเผชิญโลกเสมอ — แต่หลายครั้งตอบสนองเร็วกว่าเวลาที่ใช้คิด เห็นสิ่งที่ชอบก็อยากเข้าไปทันที ตื่นเต้นก็แสดงออกทันที สิ่งเหล่านี้ไม่ใช่ความดื้อ แต่เป็นธรรมชาติของ ESCA ที่ต้องเรียนรู้ \"การหยุดคิดก่อนลงมือ\"</p>\n              </div>\n\n              <!-- core program -->\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:15px\">FBI</div>\n                <div><div style=\"font-weight:800;font-size:15px;color:#FAF7F1;margin-bottom:3px\">Four Basic Instinct</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">ก่อนพัฒนาสู่ศักยภาพสูงสุด ESCA ต้องเรียนรู้การควบคุมตัวเอง — FBI สร้างสมาธิ การสื่อสาร ความสัมพันธ์กับเจ้าของ และการจัดการอารมณ์</p></div>\n              </div>\n\n              <!-- growth path -->\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"zap\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Agility Dog</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — ได้ใช้พลังงาน ความกล้า และการเรียนรู้อย่างเต็มที่</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">พัฒนาความคิดสร้างสรรค์ การเรียนรู้ และการทำงานร่วมกับเจ้าของ</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">สร้าง Body Awareness และเพิ่มการควบคุมร่างกาย ที่ ESCA มักขาดเมื่อตื่นเต้น</div></div></div>\n              </div>\n\n              <!-- potential -->\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ ESCA</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการฝึกอย่างเหมาะสม ESCA จะกลายเป็นสุนัขที่มีความมั่นใจ มีสมาธิ พร้อมทำงาน พร้อมเรียนรู้ และพร้อมเผชิญความท้าทาย — เปล่งประกายได้ในแทบทุกกิจกรรม หากได้รับรากฐานที่ถูกต้องตั้งแต่แรก</p>\n              </div>\n\n              <!-- best classes ranked -->\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">FBI</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Agility Dog</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n              </div>\n\n              <!-- closing -->\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">ESCA ไม่ได้เกิดมาเพื่ออยู่นิ่ง ๆ<br><span style=\"color:#B8860B\">พวกเขาเกิดมาเพื่อเรียนรู้ สำรวจ และใช้ชีวิตอย่างเต็มศักยภาพในทุกวัน</span></p>\n              </div>\n\n            </div>", "ESCM": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">⭐</span> Social Energizer</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">ESCM</div>\n                <h2 style=\"font-size:28px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.05\">THE WANDERER</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:2px\">นักเดินทางผู้ค้นพบโลก</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"โลกไม่ได้มีไว้ให้รีบผ่านไป แต่มีไว้ให้ค่อย ๆ ค้นพบ\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">ESCM คือสุนัขที่มีความอยากรู้อยากเห็นเป็นธรรมชาติ — ไม่ได้วิ่งเข้าหาทุกอย่างเหมือน ESCA แต่ก็ไม่ระวังตัวจนไม่กล้าลอง มีความสมดุลระหว่างความมั่นใจ ความเป็นมิตร และความสงบ ESCM ไม่ต้องการความตื่นเต้นตลอดเวลา แต่ต้องการ \"ประสบการณ์\"</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"search\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">ทุกกลิ่นมีความหมาย — ค่อย ๆ ดมและซึมซับ</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"compass\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สถานที่ใหม่ — สังเกตและทำความเข้าใจ ไม่รีบ</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"users\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เจอผู้คน — เข้าหาอย่างสุภาพและเป็นมิตร</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:18px;font-weight:800;color:#F0B74C;line-height:1.3\">\"โลกเต็มไปด้วยเรื่องราวที่น่าสนใจ\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">ทุกกลิ่นมีความหมาย ทุกสถานที่มีสิ่งให้ค้นพบ — ESCM เลือกที่จะซึมซับโลก มากกว่าวิ่งผ่านโลก</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>เปิดรับประสบการณ์ใหม่</div><div>ปรับตัวเก่ง</div><div>เป็นมิตรโดยธรรมชาติ</div><div>ยืดหยุ่นสูง</div><div>สมดุลทางอารมณ์</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>สิ่งแวดล้อมน่าสนใจกว่าเจ้าของ</div><div>สมาธิเปลี่ยนตามสิ่งรอบตัว</div><div>ชอบตัดสินใจเอง</div><div>เบื่อความจำเจน</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">ESCM ไม่ระเบิดอารมณ์ แต่มักถอยไปใช้โลกของตัวเอง — ดมพื้นตลอดเวลา มองสิ่งอื่น เหม่อ ไม่ตอบสนองต่อเจ้าของ — หลายครั้งเข้าใจผิดว่า \"ไม่สนใจ\" แต่จริง ๆ นี่คือวิธีจัดการความเครียดของ ESCM</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">พาออกไปทำกิจกรรม</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เปิดโอกาสให้สำรวจ</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ไม่ควบคุมมากเกินไป</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เข้าใจการเรียนรู้ผ่านประสบการณ์</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ ESCM ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"การเลือกเจ้าของท่ามกลางสิ่งเร้า\" — ธรรมชาติของ ESCM คือการสนใจโลก เมื่อพัฒนาจุดนี้ได้ พวกเขาจะกลายเป็นสุนัขที่พาไปได้ทุกที่</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:15px\">FBI</div>\n                <div><div style=\"font-weight:800;font-size:15px;color:#FAF7F1;margin-bottom:3px\">Four Basic Instinct</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">FBI ไม่ได้ลดความอยากรู้อยากเห็น แต่สอนว่า \"เจ้าของก็เป็นส่วนหนึ่งของโลกที่น่าสนใจ\" — สร้างสมาธิ การสื่อสาร ความสัมพันธ์ และการควบคุมอารมณ์</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — ตอบสนองธรรมชาติการสำรวจและใช้จมูก สนุกและสำเร็จได้เร็ว</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">กระตุ้นสมอง และเพิ่มการสื่อสารระหว่างสุนัขกับเจ้าของ</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เพิ่มสมาธิ พัฒนาการรับรู้ร่างกาย และสร้างความมั่นใจ</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ ESCM</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการฝึกอย่างเหมาะสม ESCM จะกลายเป็นสุนัขที่ปรับตัวเก่ง พาไปได้ทุกที่ เรียนรู้เร็ว และใช้ชีวิตร่วมกับคนได้อย่างสมดุล — ไม่ใช่สุนัขที่โดดเด่นที่สุด แต่คือ \"คู่เดินทางที่ดีที่สุด\"</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">FBI</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">ESCM = Curious + Friendly + Balanced<br><span style=\"color:#B8860B\">\"สุนัขที่มีความสุขที่สุด เมื่อได้ออกไปเรียนรู้โลกทีละก้าว พร้อมเจ้าของข้างกาย\" 🐾</span></p>\n              </div>\n\n            </div>", "FSCM": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">⭐</span> Social Energizer</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">FSCM</div>\n                <h2 style=\"font-size:25px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.08\">THE HEART<br>OF THE FAMILY</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">หัวใจของครอบครัว</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ความสุขของฉัน ไม่ได้อยู่ที่การผจญภัย แต่อยู่ที่การได้ใช้เวลาร่วมกัน\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">FSCM คือสุนัขที่หลายคนนึกถึงเมื่อพูดคำว่า \"หมาครอบครัวในอุดมคติ\" — เป็นมิตร รักผู้คน ชอบอยู่กับครอบครัว และมีพลังงานในระดับสมดุล พวกเขาไม่ได้ต้องการเป็นผู้นำหรือดาวเด่น สิ่งที่ต้องการคือการมีส่วนร่วมในชีวิตประจำวันของคนที่รัก</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"heart\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">ได้อยู่ร่วมกัน — มีค่ามากกว่ากิจกรรมใด ๆ</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"home\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เดินเล่น ดูทีวี ขับรถเที่ยว — ขอแค่ได้อยู่ด้วย</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"users\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เข้ากับเด็ก ผู้ใหญ่ และผู้สูงอายุได้ดี</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:17px;font-weight:800;color:#F0B74C;line-height:1.3\">\"โลกเป็นสถานที่ที่ดี เมื่อมีคนที่ฉันรักอยู่ด้วย\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">ให้ความสำคัญกับความสัมพันธ์เป็นอันดับแรก — เมื่อเจอสถานการณ์ใหม่ สิ่งแรกที่ FSCM มองหาคือความรู้สึกปลอดภัยจากคนรอบตัว</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>เข้ากับคนง่าย</div><div>สมดุลทางอารมณ์</div><div>ปรับตัวเข้ากับครอบครัว</div><div>รักการมีส่วนร่วม</div><div>เรียนรู้ได้ดี</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>พึ่งพาคนมากเกินไป</div><div>ไม่ชอบอยู่ลำพังนาน</div><div>ขาดแรงผลักดันบางครั้ง</div><div>หลีกเลี่ยงความขัดแย้ง</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">FSCM ไม่ระเบิดอารมณ์ แต่จะติดเจ้าของมากขึ้น ขอความสนใจมากขึ้น เดินตามตลอดเวลา ดูไม่มั่นใจ และขาดความกระตือรือร้น — พยายามหาความมั่นคงจากความสัมพันธ์</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ให้เวลากับสุนัข</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ชอบทำกิจกรรมร่วมกัน</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">มีความสม่ำเสมอ</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">มอบความมั่นคงทางอารมณ์</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ FSCM ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"การสร้างความมั่นใจในตัวเอง\" — FSCM มีความสัมพันธ์กับคนดีมาก แต่บางครั้งพึ่งพาความมั่นคงจากคนมากเกินไป บทเรียนสำคัญคือ \"ฉันสามารถเผชิญโลกได้ด้วยตัวเองเช่นกัน\"</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:15px\">FBI</div>\n                <div><div style=\"font-weight:800;font-size:15px;color:#FAF7F1;margin-bottom:3px\">Four Basic Instinct</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">FBI ช่วยสร้างสมาธิ เพิ่มความมั่นใจ พัฒนาการสื่อสาร และสร้างความเข้าใจระหว่างเจ้าของกับสุนัข — แม้ FSCM อยู่ร่วมกับคนได้ดีอยู่แล้ว แต่ FBI ช่วยให้ความสัมพันธ์มีคุณภาพมากขึ้น</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — พัฒนาความมั่นใจ การควบคุมร่างกาย และการทำงานอย่างมีสมาธิ</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">FSCM สนุกกับการเรียนรู้ร่วมกับเจ้าของ และชอบได้รับคำชมจากคนที่รัก</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">ส่งเสริมการตัดสินใจด้วยตัวเอง และเพิ่มความมั่นใจในการแก้ปัญหา</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ FSCM</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม FSCM จะกลายเป็นสุนัขที่อบอุ่น มั่นคง ปรับตัวเก่ง เป็นมิตร และมีความสัมพันธ์ที่ดีต่อทั้งคนและสุนัข — อาจไม่โดดเด่นที่สุดในสนามแข่ง แต่ทำให้ชีวิตประจำวันของคนรอบตัวมีความสุขที่สุด</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">FBI</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">FSCM = Focused + Social + Confident + Moderate<br><span style=\"color:#B8860B\">\"สุนัขที่เชื่อว่าความสุขที่แท้จริง คือการได้ใช้ชีวิตร่วมกับครอบครัวในทุก ๆ วัน\" 🐾❤️</span></p>\n              </div>\n\n            </div>", "FSCA": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">⭐</span> Social Energizer</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">FSCA</div>\n                <h2 style=\"font-size:28px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.05\">THE TEAM CAPTAIN</h2>\n                <div style=\"font-size:14px;font-weight:700;color:#5A4A28;margin-top:4px\">กัปตันทีมผู้เกิดมาเพื่อทำงานร่วมกับคน</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"เมื่อเราเข้าใจกัน ไม่มีอะไรที่ทำไม่ได้\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">FSCA คือสุนัขที่เกิดมาพร้อมพรสวรรค์ในการทำงานร่วมกับมนุษย์ — ไม่ได้หลงใหลการสำรวจเหมือน ESCM ไม่ได้ใช้ชีวิตตามแรงกระตุ้นเหมือน ESCA สิ่งที่ FSCA ต้องการคือ \"การได้ร่วมมือกันทำบางสิ่งให้สำเร็จ\"</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"eye\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">มองหน้าเจ้าของบ่อย — คอยสังเกตสัญญาณเล็ก ๆ</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"zap\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">การฝึกไม่ใช่หน้าที่ — แต่เป็นกิจกรรมที่สนุก</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"target\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">การเรียนรู้คือความท้าทายที่น่าตื่นเต้น</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:18px;font-weight:800;color:#F0B74C;line-height:1.3\">\"ความสำเร็จเกิดจากการทำงานร่วมกัน\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">เมื่อเจอสถานการณ์ใหม่ สิ่งแรกที่มองหาไม่ใช่สิ่งแวดล้อม แต่คือเจ้าของ — โลกของ FSCA หมุนรอบความร่วมมือมากกว่าการสำรวจ</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>โฟกัสเจ้าของสูง</div><div>ชอบเรียนรู้</div><div>ทำงานเป็นทีมเก่ง</div><div>มีแรงจูงใจสูง</div><div>พัฒนาได้ไกล</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>ตื่นเต้นกับงานเกินไป</div><div>พึ่งสัญญาณเจ้าของมาก</div><div>รับอารมณ์เจ้าของง่าย</div><div>คาดหวังความชัดเจน</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">FSCA ไม่หลีกหนีปัญหา แต่จะพยายามแก้ไขมากขึ้น — เสนอพฤติกรรมหลายอย่างติดกัน รีบตอบสนอง ขาดความนิ่ง ดูกังวลเมื่อทำผิด พวกเขาไม่กลัวความล้มเหลว แต่กลัวการไม่เข้าใจสิ่งที่เจ้าของต้องการ</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ชอบฝึกสุนัข</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ทำกิจกรรมร่วมกัน</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">สื่อสารชัดเจน</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">พัฒนาไปพร้อมกัน</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ FSCA ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"การควบคุมความตื่นเต้นและความคาดหวัง\" — FSCA อยากทำได้ดีจนบางครั้งรีบเกินไป บทเรียนสำคัญคือ \"ไม่ใช่ทุกอย่างต้องรีบทำให้สำเร็จ\" การหยุดคิดและทำงานอย่างนิ่งมั่นคงคือสิ่งที่ปลดล็อกศักยภาพที่แท้จริง</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:15px\">FBI</div>\n                <div><div style=\"font-weight:800;font-size:15px;color:#FAF7F1;margin-bottom:3px\">Four Basic Instinct</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">FBI คือรากฐานสำคัญของ FSCA — พัฒนาสมาธิ การควบคุมอารมณ์ การสื่อสาร และความเข้าใจระหว่างสุนัขกับเจ้าของ เมื่อผ่าน FBI พวกเขามักแสดงศักยภาพออกมาได้อย่างชัดเจน</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — พัฒนาความนิ่ง ความแม่นยำ การควบคุมร่างกาย และสมาธิในการทำงาน</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">ได้ใช้ความสามารถในการเรียนรู้และการสื่อสารเต็มที่ เรียนรู้ท่าใหม่ได้รวดเร็ว</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"zap\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Agility Dog</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">ใช้ทั้งสมองและร่างกายไปพร้อมกัน ปลดปล่อยพลังงานในรูปแบบที่มีเป้าหมาย</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ FSCA</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม FSCA จะกลายเป็นสุนัขที่มีสมาธิสูง ควบคุมตัวเองได้ดี ทำงานเป็นทีมยอดเยี่ยม เรียนรู้รวดเร็ว และพร้อมรับความท้าทายใหม่ — สร้างความประทับใจให้ทั้งเจ้าของและผู้ฝึก เพราะพวกเขารักการเรียนรู้ร่วมกับคน</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">FBI</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Agility Dog</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">FSCA = Focused + Social + Confident + Active<br><span style=\"color:#B8860B\">\"สุนัขที่เกิดมาเพื่อเรียนรู้ ทำงาน และสร้างความสำเร็จร่วมกับมนุษย์\" 🐾🏆</span></p>\n              </div>\n\n            </div>", "ESNA": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🌱</span> Sensitive Soul</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">ESNA</div>\n                <h2 style=\"font-size:27px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.05\">THE HOPEFUL HEART</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:3px\">หัวใจที่อยากรู้จักโลก</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ฉันอยากเข้าไปหา... แต่บางครั้งความกลัวก็เดินไปถึงก่อน\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">ESNA คือสุนัขที่เต็มไปด้วยความขัดแย้งในตัวเอง — อยากเข้าสังคม อยากรู้จักโลก อยากทักทายผู้คน แต่ในขณะเดียวกันก็มีความกังวลซ่อนอยู่ภายใน พวกเขาไม่ได้ไม่ชอบโลก แต่ยังไม่มั่นใจว่าจะรับมือกับโลกได้ดีแค่ไหน</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"users\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">อยากเข้าไปหา — แต่พอเข้าใกล้กลับเห่า</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"heart\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">ตื่นเต้นมาก แต่เหมือนกลัวไปพร้อมกัน</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"refresh-cw\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">มั่นใจในบางวินาที ไม่มั่นใจในอีกวินาที</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:16px;font-weight:800;color:#F0B74C;line-height:1.35\">\"โลกน่าสนใจ... แต่ฉันยังไม่แน่ใจว่าปลอดภัยหรือเปล่า\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">เมื่อเจอคนใหม่อยากเข้าไปดูแต่ก็พร้อมถอย เจอหมาตัวอื่นอาจตื่นเต้นจนเห่า แต่ลึก ๆ กำลังพยายามจัดการอารมณ์ตัวเอง</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>เป็นมิตรโดยธรรมชาติ</div><div>อยากรู้อยากเห็น</div><div>อ่อนโยน</div><div>เข้าใจอารมณ์คนดี</div><div>มีศักยภาพพัฒนาสูง</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>Reactive ได้ง่าย</div><div>เห่าง่ายเมื่อเครียด</div><div>อารมณ์ขึ้นลงตามสิ่งแวดล้อม</div><div>ไม่มั่นใจในสถานการณ์ใหม่</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">ESNA มักแสดงออกด้วยการเห่า กระโดด ตื่นตัวสูง เดินวน ดึงสายจูง ควบคุมตัวเองลำบาก — หลายคนมองว่าก้าวร้าว แต่จริง ๆ พวกเขากำลังพยายามจัดการความรู้สึกไม่มั่นคงภายใน</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ใจเย็น</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เข้าใจพฤติกรรมสุนัข</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ไม่ใช้การลงโทษ</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">สร้างความมั่นใจทีละขั้น</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ ESNA ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"ความมั่นใจในการเผชิญโลก\" — ESNA ไม่ได้ขาดความกล้า แต่ขาดความเชื่อมั่นในตัวเอง บทเรียนสำคัญคือ \"ฉันรับมือกับสิ่งใหม่ได้\" เมื่อเรียนรู้ว่าไม่จำเป็นต้องเห่าหรือตื่นตระหนก ความสงบจะเข้ามาแทนความกังวล</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span class=\"db\" style=\"font-size:22px\"><i data-lucide=\"volume-x\"></i></span></div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">หยุดเห่าอย่างเข้าใจ</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">คลาสที่เหมาะที่สุด — ปัญหาของ ESNA ไม่ได้เกิดจากการไม่เชื่อฟัง แต่เกิดจากอารมณ์ที่ล้นเกิน ช่วยลดความเครียด สร้างความมั่นใจ เข้าใจสิ่งกระตุ้น และควบคุมอารมณ์ (รวมพื้นฐาน FBI ไว้แล้ว)</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เหมาะที่สุดหลังผ่านพื้นฐาน — สร้างความมั่นใจ และเปิดโอกาสให้สุนัขประสบความสำเร็จด้วยตัวเอง</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">พัฒนาสมาธิ การควบคุมร่างกาย และความมั่นคงทางอารมณ์</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">สร้างความเชื่อมั่นผ่านการเรียนรู้และความสำเร็จเล็ก ๆ ในแต่ละวัน</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ ESNA</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการช่วยเหลืออย่างเหมาะสม ESNA จะกลายเป็นสุนัขที่เป็นมิตร อ่อนโยน เข้าใจคน มั่นใจในตัวเอง และพร้อมเรียนรู้สิ่งใหม่ — หลายคนจำพวกเขาจากวันที่เห่าหรือกังวล แต่เมื่อเติบโตขึ้น มักกลายเป็นสุนัขที่อบอุ่นและเข้ากับคนได้ดีที่สุดประเภทหนึ่ง</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">หยุดเห่าอย่างเข้าใจ</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">FBI</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">ESNA = Social + Curious + Sensitive + Active<br><span style=\"color:#B8860B\">\"สุนัขที่อยากรู้จักโลกมากกว่าที่กลัวโลก แต่ยังต้องการเวลาเพื่อเชื่อมั่นในตัวเอง\" 🐾💛</span></p>\n              </div>\n\n            </div>", "FSNA": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🌱</span> Sensitive Soul</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">FSNA</div>\n                <h2 style=\"font-size:26px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.08\">THE SENSITIVE HELPER</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">ผู้ช่วยผู้แสนอ่อนโยน</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ฉันไม่ต้องการทั้งโลก ฉันแค่ต้องการรู้ว่าคนที่ฉันรักปลอดภัย\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">FSNA คือสุนัขที่มีความผูกพันกับเจ้าของสูงมาก ใช้หัวใจนำทางชีวิต ให้ความสำคัญกับความสัมพันธ์ และรับรู้อารมณ์คนเก่ง พวกเขาให้ความสำคัญกับ \"คน\" มากกว่า \"สิ่งแวดล้อม\" — เมื่อเจ้าของมีความสุข FSNA มักสุขตาม เมื่อเจ้าของเครียดก็ได้รับผลกระทบเช่นกัน</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"heart\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">ใช้หัวใจนำทาง — ความสัมพันธ์มาก่อน</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"eye\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สังเกตคนที่รักตลอดเวลา</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"activity\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">รับอารมณ์เจ้าของได้ไว สุข/เครียดตาม</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:18px;font-weight:800;color:#F0B74C;line-height:1.35\">\"ความปลอดภัยอยู่ที่ความสัมพันธ์\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">เมื่อเจอสถานการณ์ใหม่ สิ่งแรกที่มองหาไม่ใช่ทางออก แต่คือเจ้าของ — พวกเขาใช้ความสัมพันธ์เป็นเข็มทิศในการใช้ชีวิต</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>ผูกพันกับเจ้าของสูง</div><div>เข้าใจอารมณ์คนเก่ง</div><div>แรงจูงใจจากความสัมพันธ์</div><div>อ่อนโยน ไม่ก้าวร้าว</div><div>พร้อมร่วมมือ</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>ขาดมั่นใจเมื่ออยู่ลำพัง</div><div>กังวลต่อการเปลี่ยนแปลง</div><div>รับอารมณ์เจ้าของมากไป</div><div>Reactive จากความไม่มั่นใจ</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">FSNA มักติดเจ้าของมากขึ้น เห่าเมื่อไม่มั่นใจ เดินตามตลอดเวลา หลีกเลี่ยงสิ่งที่กังวล และดูไม่มั่นใจในการตัดสินใจ — หลายครั้งเจ้าของคิดว่าเป็นความดื้อ แต่จริง ๆ พวกเขากำลังมองหาความมั่นคงทางอารมณ์</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ใจเย็น</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เข้าใจอารมณ์สุนัข</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">สม่ำเสมอ</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">สร้างความมั่นใจทีละขั้น</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ FSNA ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"ความมั่นใจที่ไม่ต้องพึ่งพาคนอื่นตลอดเวลา\" — FSNA มีความรักมากมาย แต่บางครั้งกลายเป็นการพึ่งพา บทเรียนสำคัญคือ \"ฉันปลอดภัยได้ แม้ไม่มีเจ้าของอยู่ข้าง ๆ ทุกวินาที\" เมื่อเรียนรู้สิ่งนี้ ความมั่นใจจะเติบโตจากภายใน</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span class=\"db\" style=\"font-size:22px\"><i data-lucide=\"volume-x\"></i></span></div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">หยุดเห่าอย่างเข้าใจ</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">คลาสที่เหมาะที่สุด — FSNA มักมีปัญหาจากความกังวล ความไม่มั่นใจ และการพึ่งพาเจ้าของสูง คลาสนี้ช่วยสร้างความมั่นใจ ลดความเครียด ควบคุมอารมณ์ และรับมือสิ่งเร้าอย่างเหมาะสม (รวมพื้นฐาน FBI ไว้แล้ว)</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — พัฒนาความมั่นใจ การควบคุมร่างกาย และการตัดสินใจด้วยตัวเอง</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">สร้างความสำเร็จเล็ก ๆ อย่างต่อเนื่อง เพิ่มความเชื่อมั่นผ่านการทำงานร่วมกับเจ้าของ</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">ส่งเสริมการแก้ปัญหาด้วยตัวเอง และสร้างความมั่นใจจากภายใน</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ FSNA</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม FSNA จะกลายเป็นสุนัขที่อ่อนโยน เข้าใจคน มั่นคงทางอารมณ์ มีความสัมพันธ์ที่ลึกซึ้ง และพร้อมเผชิญโลกด้วยตัวเองมากขึ้น — อาจไ
