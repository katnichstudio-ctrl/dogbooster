ose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เหมาะที่สุด — เปลี่ยนพลังงานจากการเฝ้าระวังไปสู่การแก้ปัญหาอย่างสร้างสรรค์</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เพิ่มสมาธิ การควบคุมร่างกาย และความมั่นคงทางอารมณ์</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">สร้างความเชื่อมั่นในการทำงานร่วมกับเจ้าของ ลดการตัดสินใจทุกอย่างด้วยตัวเอง</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ FRNA</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม FRNA จะกลายเป็นสุนัขที่สุขุม น่าเชื่อถือ มั่นคง มีสติ และเป็นผู้ปกป้องที่ยอดเยี่ยม — ไม่ได้เกิดมาเพื่อควบคุมโลก แต่เกิดมาเพื่อดูแลสิ่งที่รักอย่างดีที่สุด</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">หยุดเห่าอย่างเข้าใจ</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">FRNA = Focused + Reserved + Sensitive + Active<br><span style=\"color:#B8860B\">\"สุนัขผู้พิทักษ์ที่เงียบสงบ ผู้เรียนรู้ว่าบางครั้งการปล่อยวาง ก็เป็นการปกป้องตัวเองเช่นกัน\" 🐾🛡️</span></p>\n              </div>\n\n            </div>", "ERCM": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🧭</span> Independent Thinker</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">ERCM</div>\n                <h2 style=\"font-size:27px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.05\">THE LONE EXPLORER</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">นักสำรวจผู้รักอิสระ</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"โลกกว้างเกินกว่าจะอยู่กับที่ และฉันอยากค้นพบมันด้วยตัวเอง\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">ERCM คือสุนัขที่มีความเป็นอิสระสูงที่สุดในกลุ่ม Curious Types — ไม่ยึดผู้คนเป็นศูนย์กลาง ไม่ต้องการคำชมตลอดเวลา สิ่งที่สนใจคือ \"โลกภายนอก\" ชอบสำรวจ สังเกต แก้ปัญหา และค้นหาคำตอบด้วยตัวเอง หาก ESCA คือนักผจญภัยที่ตื่นเต้นกับทุกอย่าง ERCM คือนักสำรวจที่มีเป้าหมาย</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"compass\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สถานที่ใหม่ — อยากสำรวจด้วยตัวเอง</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"search\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">กลิ่นใหม่ — อยากตามหา</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"puzzle\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เจอปัญหา — อยากลองแก้เองก่อน</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:18px;font-weight:800;color:#F0B74C;line-height:1.35\">\"ทุกสิ่งมีบางอย่างให้เรียนรู้\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">ERCM เชื่อในการเรียนรู้ผ่านประสบการณ์ตรงมากกว่าการรอคำแนะนำ</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>พึ่งพาตัวเองได้สูง</div><div>ช่างสังเกต</div><div>เรียนรู้จากประสบการณ์เร็ว</div><div>มีสมาธิกับสิ่งที่สนใจ</div><div>ปรับตัวเก่ง</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>สนใจโลกมากกว่าเจ้าของ</div><div>เป็นตัวของตัวเองสูง</div><div>ชอบคิดเอง</div><div>ดูห่างเหิน</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">ERCM มักถอนตัว ไม่สนใจคำสั่ง ใช้เวลาอยู่กับตัวเองมากขึ้น ดื้อเงียบ และพยายามควบคุมสถานการณ์ด้วยตัวเอง — ไม่แสดงความเครียดออกมาชัดเจน แต่จะสร้างระยะห่างแทน</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เคารพความเป็นตัวของตัวเอง</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ชอบกิจกรรมใช้สมอง</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ไม่ควบคุมมากเกินไป</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เป็น \"คู่คิด\" มากกว่า \"ผู้สั่งการ\"</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ ERCM ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"การเลือกเชื่อมต่อกับคน\" — ERCM ใช้ชีวิตด้วยตัวเองได้สูงจนบางครั้งลืมคุณค่าของการทำงานร่วมกับผู้อื่น บทเรียนสำคัญคือ \"การร่วมมือไม่ได้ลดทอนความเป็นตัวเอง\" เมื่อเชื่อมต่อกับเจ้าของมากขึ้น การทำงานเป็นทีมจะเปิดประตูสู่ประสบการณ์ใหม่</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:15px\">FBI</div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">Four Basic Instinct</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">FBI คือรากฐานสำคัญของ ERCM — ช่วยให้เรียนรู้ว่าการสื่อสารมีคุณค่า เจ้าของเป็นส่วนหนึ่งของการผจญภัยได้ และสมาธิกับความสัมพันธ์เติบโตไปพร้อมกัน</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — ตอบสนองทั้งความอยากรู้อยากเห็น การแก้ปัญหา และการทำงานอย่างอิสระ</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"zap\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Agility Dog</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">ปลดปล่อยพลังงานและเพิ่มความท้าทาย สำหรับสุนัขที่ชอบเรียนรู้ผ่านประสบการณ์</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">พัฒนาสมาธิ ความแม่นยำ และการควบคุมร่างกาย</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ ERCM</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม ERCM จะกลายเป็นสุนัขที่ฉลาด มั่นใจ คิดวิเคราะห์เก่ง ปรับตัวได้ดี และพร้อมเผชิญความท้าทาย — อาจไม่เรียกร้องความสนใจ แต่สร้างความประทับใจได้จากความสามารถของตัวเอง</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">FBI</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Agility Dog</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">ERCM = Explorative + Reserved + Confident + Moderate<br><span style=\"color:#B8860B\">\"สุนัขนักสำรวจผู้รักอิสระ ที่เชื่อว่าความรู้และประสบการณ์คือของขวัญที่ดีที่สุดจากโลกใบนี้\" 🐾🌎</span></p>\n              </div>\n\n            </div>", "ERNM": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🧭</span> Independent Thinker</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">ERNM</div>\n                <h2 style=\"font-size:25px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.08\">THE THOUGHTFUL OBSERVER</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">นักสังเกตการณ์ผู้สุขุม</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ฉันไม่จำเป็นต้องรีบเข้าไปหาโลก ฉันแค่อยากเข้าใจมันก่อน\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">ERNM คือสุนัขที่สงบ สุขุม และช่างสังเกต — ไม่ชอบเป็นจุดสนใจ ไม่ตื่นเต้นกับทุกสิ่ง ไม่ตอบสนองรวดเร็ว สิ่งที่ชอบมากที่สุดคือ \"การทำความเข้าใจ\" ชอบมอง ฟัง เรียนรู้ และเก็บข้อมูลก่อนตัดสินใจ หลายครั้งดูเหมือนสุนัขเงียบ ๆ แต่ภายในกำลังประมวลผลตลอดเวลา — หาก ERCM คือนักสำรวจ ERNM คือนักวิจัย</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"eye\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สถานที่ใหม่ — สังเกตก่อน</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"users\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">คนใหม่ — ประเมินก่อน</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"puzzle\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เจอปัญหา — คิดก่อนลงมือ</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:16px;font-weight:800;color:#F0B74C;line-height:1.35\">\"ทุกสิ่งควรได้รับการทำความเข้าใจก่อนตัดสิน\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">ERNM ไม่ได้หลีกเลี่ยงโลก แต่ไม่เห็นเหตุผลที่จะรีบตอบสนองต่อทุกอย่าง</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>ช่างสังเกตมาก</div><div>สุขุม</div><div>เรียนรู้จากการวิเคราะห์</div><div>ปรับตัวค่อยเป็นค่อยไป</div><div>ใช้พลังงานมีประสิทธิภาพ</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>ใช้เวลาตัดสินใจนาน</div><div>ไม่ค่อยแสดงความรู้สึก</div><div>หลีกเลี่ยงมากกว่าลองผิดลองถูก</div><div>อาจดูไม่สนใจ</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">ERNM มักถอนตัว เงียบลง หลีกเลี่ยงสถานการณ์ ชะลอการตัดสินใจ และต้องการพื้นที่ส่วนตัว — ไม่แสดงความเครียดรุนแรง แต่จะค่อย ๆ ปิดตัวเองออกจากสถานการณ์</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ใจเย็น ไม่เร่งรัด</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เรียนรู้ค่อยเป็นค่อยไป</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เคารพพื้นที่ส่วนตัว</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ชอบกิจกรรมใช้สมอง</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ ERNM ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"ความกล้าที่จะลงมือก่อนรู้ทุกคำตอบ\" — ERNM มักต้องการข้อมูลและความมั่นใจก่อนลงมือ บทเรียนสำคัญคือ \"บางครั้งการเรียนรู้ที่ดีที่สุด เกิดขึ้นหลังจากเริ่มลงมือ\" เมื่อกล้าก้าวออกจากพื้นที่ปลอดภัย โลกจะเปิดโอกาสใหม่ ๆ ให้มากกว่าที่คิด</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:15px\">FBI</div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">Four Basic Instinct</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">FBI ช่วยให้ ERNM เพิ่มความมั่นใจ พัฒนาสมาธิ สร้างความสัมพันธ์ กล้าตัดสินใจมากขึ้น — เป็นรากฐานที่ช่วยให้ ERNM นำความคิดออกมาเป็นการกระทำ</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — ใช้การสังเกต การคิดวิเคราะห์ และการแก้ปัญหาอย่างเป็นธรรมชาติ</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เพิ่มความมั่นใจ สมาธิ และการควบคุมร่างกาย</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">ส่งเสริมการเรียนรู้และความกล้าในการแสดงออก</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ ERNM</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม ERNM จะกลายเป็นสุนัขที่สุขุม ฉลาด รอบคอบ มั่นคง และเรียนรู้ได้ลึกซึ้ง — อาจไม่โดดเด่นที่สุดตั้งแต่แรกเห็น แต่เป็นสุนัขที่ยิ่งรู้จัก ยิ่งค้นพบความน่าทึ่ง</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">FBI</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">ERNM = Explorative + Reserved + Sensitive + Moderate<br><span style=\"color:#B8860B\">\"สุนัขนักสังเกตการณ์ผู้สุขุม ที่เชื่อว่าความเข้าใจคือจุดเริ่มต้นของทุกการเติบโต\" 🐾📖</span></p>\n              </div>\n\n            </div>", "FRCM": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🧭</span> Independent Thinker</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">FRCM</div>\n                <h2 style=\"font-size:26px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.08\">THE STEADFAST PARTNER</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">คู่หูผู้มั่นคง</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ฉันไม่จำเป็นต้องโดดเด่นที่สุด แค่เป็นคนที่ไว้ใจได้ที่สุดก็พอ\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">FRCM คือสุนัขที่มีความสมดุลสูงที่สุดในระบบ DBTI — ไม่สุดโต่งในด้านใด ไม่พลังงานล้น ไม่อ่อนไหวเกินไป ไม่ต้องการความสนใจจากทุกคน พวกเขามั่นคง มีวินัย สุภาพ มีเหตุผล เชื่อถือได้ — ครูฝึกหลายคนเรียกว่า \"สุนัขที่พร้อมใช้ชีวิตร่วมกับมนุษย์\" เพราะปรับตัวเข้ากับชีวิตประจำวันได้ดีมาก</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"scale\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สมดุลทุกด้าน ไม่สุดโต่ง</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"eye\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สถานการณ์ใหม่ — สังเกต ประเมิน แล้วตัดสินใจ</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"shield-check\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">มีวินัยตามธรรมชาติ เชื่อถือได้</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:18px;font-weight:800;color:#F0B74C;line-height:1.35\">\"ชีวิตที่ดี คือชีวิตที่สมดุล\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">ไม่รีบร้อน ไม่ตื่นเต้นง่าย ไม่วิตกเกินเหตุ — FRCM มองโลกด้วยความสงบ และพยายามรักษาสมดุลของตัวเองอยู่เสมอ</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>มั่นคงทางอารมณ์</div><div>ปรับตัวเก่ง</div><div>เรียนรู้สม่ำเสมอ</div><div>เชื่อถือได้</div><div>มีวินัยตามธรรมชาติ</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>ขาดแรงผลักดันบางครั้ง</div><div>ไม่ค่อยแสดงออก</div><div>ระวังตัวพอสมควร</div><div>ไม่ชอบแรงกดดัน</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">FRCM มักเงียบลง ลดการมีส่วนร่วม หลีกเลี่ยงสถานการณ์ ขาดแรงจูงใจ และขอพื้นที่ส่วนตัว — ไม่ใช่สุนัขที่แสดงความเครียดรุนแรง แต่จะค่อย ๆ ปิดตัวเองแทน</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">มีความสม่ำเสมอ</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ใจเย็น</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ให้โอกาสเรียนรู้</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เป็นคู่หูที่มั่นคง</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ FRCM ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"การกล้าออกจากพื้นที่ปลอดภัย\" — FRCM มักเลือกสิ่งที่คุ้นเคยและหลีกเลี่ยงความเสี่ยง บทเรียนสำคัญคือ \"การเติบโตมักเกิดขึ้นนอกพื้นที่ปลอดภัย\" เมื่อกล้าลองสิ่งใหม่มากขึ้น พวกเขาจะค้นพบศักยภาพที่ซ่อนอยู่มากกว่าที่คิด</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:15px\">FBI</div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">Four Basic Instinct</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">พื้นฐานที่เหมาะสมที่สุดสำหรับ FRCM — สร้างความสัมพันธ์ การสื่อสาร สมาธิ และความมั่นใจ แม้ FRCM ไม่มีปัญหาพฤติกรรมเด่นชัด แต่ FBI จะดึงศักยภาพที่มีอยู่แล้วออกมาได้เต็มที่</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — พัฒนาทั้งร่างกาย สมาธิ และความมั่นใจไปพร้อมกัน</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เพิ่มความสนุกในการเรียนรู้ และกระชับความสัมพันธ์กับเจ้าของ</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">พัฒนาการคิดวิเคราะห์ และสร้างความสำเร็จผ่านการแก้ปัญหา</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"zap\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Agility Dog</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">สำหรับ FRCM ที่เริ่มมีความมั่นใจมากขึ้น — เปิดโลกใหม่ให้กับพวกเขา</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ FRCM</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม FRCM จะกลายเป็นสุนัขที่สมดุล มั่นคง สุภาพ น่าเชื่อถือ และปรับตัวได้ดีในทุกสถานการณ์ — อาจไม่ตื่นเต้นที่สุด แต่เป็นสุนัขที่อยู่ด้วยแล้วสบายใจที่สุด</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">FBI</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#FBEFD6;border:1px solid #F0D89A;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">⭐</span><span style=\"font-weight:800;font-size:14px;color:#8A6A1E;flex:1\">Agility Dog</span><span style=\"font-size:11px;color:#B8860B;font-weight:700\">ทางเลือก</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">FRCM = Focused + Reserved + Confident + Moderate<br><span style=\"color:#B8860B\">\"สุนัขคู่หูผู้มั่นคง ที่เชื่อว่าความสำเร็จไม่ได้อยู่ที่ความเร็ว แต่อยู่ที่ความสม่ำเสมอ\" 🐾🤎</span></p>\n              </div>\n\n            </div>", "FRNM": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🧭</span> Independent Thinker</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">FRNM</div>\n                <h2 style=\"font-size:27px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.05\">THE WISE COMPANION</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">คู่หูผู้สุขุม</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ฉันไม่จำเป็นต้องรีบตัดสินโลก เพราะฉันเชื่อว่าความเข้าใจสำคัญกว่าความรวดเร็ว\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">FRNM คือบุคลิกที่สงบที่สุดในระบบ DBTI — สุขุม อ่อนโยน รอบคอบ และใช้ชีวิตอย่างมีสมดุล หลายคนเรียกว่า \"หมานิสัยดี เลี้ยงง่าย สุภาพ\" แต่สิ่งที่ทำให้ FRNM พิเศษคือความสามารถในการรักษาสมดุลระหว่างความมั่นใจ ความระมัดระวัง ความเป็นอิสระ และความสัมพันธ์กับเจ้าของได้อย่างลงตัว — เป็นสุนัขที่ทุกคนรู้สึกสบายใจเมื่ออยู่ใกล้</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"scale\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">รักษาสมดุลทุกด้านได้อย่างลงตัว</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"eye\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สถานการณ์ใหม่ — ค่อย ๆ สังเกตและปรับตัว</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"heart\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">อยู่ด้วยแล้วผ่อนคลายและสบายใจ</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:16px;font-weight:800;color:#F0B74C;line-height:1.35\">\"ไม่จำเป็นต้องรีบเข้าใจทุกอย่างในวันนี้\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">ไม่ตัดสินจากอารมณ์ แต่ใช้ประสบการณ์และความเข้าใจเป็นตัวนำทาง — มองโลกตามความเป็นจริง ไม่ลบและไม่ดีเกินจริง</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>มั่นคงทางอารมณ์สูง</div><div>สุภาพและอ่อนโยน</div><div>ปรับตัวได้ดี</div><div>เรียนรู้สม่ำเสมอ</div><div>สร้างความสบายใจ</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>ไม่ค่อยแสดงออก</div><div>หลีกเลี่ยงความขัดแย้ง</div><div>ใช้เวลาปรับตัว</div><div>ขาดแรงผลักดันบางครั้ง</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">FRNM มักเงียบลง ถอยออกจากสถานการณ์ ลดการมีปฏิสัมพันธ์ นอนมากขึ้น และไม่ค่อยแสดงความต้องการ — เพราะไม่แสดงอารมณ์ชัดเจน เจ้าของจึงต้องสังเกตความเปลี่ยนแปลงเล็ก ๆ ให้ดี</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ใจเย็น</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">มีความสม่ำเสมอ</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ไม่เร่งรัด</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">พร้อมเติบโตไปด้วยกัน</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ FRNM ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"การกล้าก้าวออกไปสัมผัสโลกมากขึ้น\" — FRNM มักอยู่ในพื้นที่ที่คุ้นเคย บทเรียนสำคัญคือ \"ความสงบและการเติบโตอยู่ร่วมกันได้\" ไม่ต้องเปลี่ยนเป็นสุนัขกล้าบ้าบิ่น แค่เปิดใจรับประสบการณ์ใหม่บ้าง เพราะโลกยังมีสิ่งดี ๆ รออยู่มากกว่าที่คิด</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:15px\">FBI</div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">Four Basic Instinct</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">โปรแกรมที่เหมาะสมที่สุดสำหรับ FRNM — เสริมความสัมพันธ์ ความมั่นใจ การสื่อสาร และสมาธิ แม้ FRNM ไม่มีปัญหาพฤติกรรมเด่นชัด แต่ FBI ช่วยให้พวกเขาเติบโตอย่างสมดุลยิ่งขึ้น</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">สร้างความมั่นใจ การรับรู้ร่างกาย และการเคลื่อนไหวอย่างมีสติ</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">กระตุ้นสมอง และเปิดโอกาสให้ได้ใช้ความสามารถในการแก้ปัญหา</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เพิ่มความสนุกในการเรียนรู้ และสร้างความสัมพันธ์กับเจ้าของ</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"zap\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Agility Dog</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เหมาะสำหรับ FRNM ที่เริ่มมีความมั่นใจมากขึ้น และอยากลองออกจาก Comfort Zone</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ FRNM</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม FRNM จะกลายเป็นสุนัขที่สุภาพ สมดุล มั่นคง เข้าใจคน และปรับตัวได้ดีในทุกสถานการณ์ — อาจไม่โดดเด่นที่สุดในสายตาคนทั่วไป แต่เป็นสุนัขที่เจ้าของหลายคนใฝ่ฝันจะใช้ชีวิตร่วมด้วย</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">FBI</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#FBEFD6;border:1px solid #F0D89A;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">⭐</span><span style=\"font-weight:800;font-size:14px;color:#8A6A1E;flex:1\">Agility Dog</span><span style=\"font-size:11px;color:#B8860B;font-weight:700\">ทางเลือก</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">FRNM = Focused + Reserved + Sensitive + Moderate<br><span style=\"color:#B8860B\">\"สุนัขคู่หูผู้สุขุม ที่เชื่อว่าชีวิตที่ดีไม่จำเป็นต้องรีบ แค่เติบโตอย่างมั่นคงในทุกวันก็เพียงพอแล้ว\" 🐾🌿</span></p>\n              </div>\n\n            </div>"}</script>
  <script>
    (function () {
      var DATA = JSON.parse(document.getElementById('type-data').textContent);
      var params = new URLSearchParams(location.search);
      var code = (params.get('type') || 'ESCA').toUpperCase();
      var root = document.getElementById('type-root');
      if (DATA[code]) {
        document.title = 'DogBooster — ' + code;
        root.innerHTML = DATA[code];
        // Inject circular logo top-left, replacing the back-button row's left slot
        var nav = root.querySelector('div[style*="justify-content:space-between"]');
        if (nav) {
          var logoBtn = nav.querySelector('div[onclick="history.back()"]') || nav.firstElementChild;
          if (logoBtn) {
            logoBtn.style.cssText = 'width:44px;height:44px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);overflow:hidden;';
            logoBtn.removeAttribute('onclick');
            logoBtn.onclick = function(){ history.back(); };
            logoBtn.innerHTML = '<img src="assets/logo.png" style="width:36px;height:36px;object-fit:contain;" alt="DogBooster">';
          }
        }
      } else {
        var codes = Object.keys(DATA).map(function (c) {
          return '<a href="?type=' + c + '">' + c + '</a>';
        }).join(' · ');
        root.innerHTML = '<div class="not-found"><p>ไม่พบบุคลิก "' +
          code.replace(/[^A-Z]/g, '') + '"</p><p style="margin-top:14px;font-size:13px">' +
          codes + '</p></div>';
      }
      lucide.createIcons();
    })();
  </script>

  <script>
  // === Inject dog photo + dog name from sessionStorage ===
  (function() {
    var photo = sessionStorage.getItem('dogPhoto');
    var dogName = sessionStorage.getItem('dogName') || '';

    // Replace paw-print placeholder with real photo — retry until found
    function injectPhoto(attempts) {
      var box = null;
      document.querySelectorAll('#type-root div').forEach(function(d) {
        var s = d.getAttribute('style') || '';
        if (s.indexOf('172px') !== -1) box = d;
      });
      if (box && photo) {
        box.style.overflow = 'hidden';
        box.style.borderRadius = '26px';
        box.innerHTML = '<img src="' + photo + '" style="width:100%;height:100%;object-fit:cover;border-radius:26px;display:block;" alt="dog">';
      } else if (attempts > 0) {
        setTimeout(function() { injectPhoto(attempts - 1); }, 50);
      }
    }
    injectPhoto(20);  // retry up to 20×50ms = 1 second

      // Inject dog name above type name if available
    function injectName(attempts) {
      var h2 = document.querySelector('#type-root h2');
      if (h2 && dogName) {
        var label = document.createElement('div');
        label.style.cssText = 'font-size:13px;font-weight:700;color:rgba(21,19,15,.55);letter-spacing:.04em;margin-bottom:6px;';
        label.textContent = 'บุคลิกของ ' + dogName + ' คือ';
        h2.parentNode.insertBefore(label, h2);
      } else if (attempts > 0) {
        setTimeout(function() { injectName(attempts - 1); }, 50);
      }
    }
    injectName(20);
  })();

  // === Download personality card ===
  function downloadPersonalityCard() {
    var photo = sessionStorage.getItem('dogPhoto');
    var dogName = sessionStorage.getItem('dogName') || 'น้อง';
    var params = new URLSearchParams(location.search);
    var code = (params.get('type') || 'ESCA').toUpperCase();

    // Get type name + nameTh from rendered DOM
    var h2 = document.querySelector('#type-root h2');
    var nameEn = h2 ? h2.textContent.trim() : code;
    var divs = h2 ? h2.parentNode.querySelectorAll('div') : [];
    var nameTh = '';
    for (var i=0; i<divs.length; i++) {
      var t = divs[i].textContent.trim();
      if (t && t.length < 60 && /[ก-ฮ]/.test(t)) { nameTh = t; break; }
    }

    // Trait scores from sessionStorage (saved by onboarding)
    var axes = JSON.parse(sessionStorage.getItem('dogAxes') || 'null') ||
               {am:0.7, sr:0.75, cn:0.8, ef:0.35};
    var TRAITS = [
      {label:'Active',    opp:'Moderate', val:axes.am},
      {label:'Social',    opp:'Reserved', val:axes.sr},
      {label:'Confident', opp:'Nervous',  val:axes.cn},
      {label:'Focused',   opp:'Explorer', val:1-axes.ef},
    ];

    var W = 390, H = 700;
    var canvas = document.createElement('canvas');
    canvas.width = W * 2; canvas.height = H * 2;
    var ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.font = '14px sans-serif'; // ensure font is set

    function draw(img) {
      // ── TOP HALF: gold gradient ──
      var grad = ctx.createLinearGradient(0,0,W,H*0.48);
      grad.addColorStop(0,'#F7CE7E');
      grad.addColorStop(0.55,'#F0B74C');
      grad.addColorStop(1,'#E0A02F');
      ctx.fillStyle = grad;
      roundRect(ctx, 0, 0, W, H, 28);
      ctx.fill();

      // diagonal pattern
      ctx.save();
      ctx.clip();
      ctx.strokeStyle = 'rgba(255,255,255,0.07)';
      ctx.lineWidth = 1;
      for (var d=-H; d<W+H; d+=28) {
        ctx.beginPath(); ctx.moveTo(d,0); ctx.lineTo(d+H,H); ctx.stroke();
      }
      ctx.restore();

      // logo pill top-left
      ctx.fillStyle = 'rgba(21,19,15,0.85)';
      roundRect(ctx, 20, 20, 130, 30, 15);
      ctx.fill();
      ctx.fillStyle = '#F0B74C';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('⭐  DogBooster', 34, 40);

      // dog photo box
      var boxSize = 160, boxX = (W-boxSize)/2, boxY = 60;
      ctx.save();
      roundRect(ctx, boxX, boxY, boxSize, boxSize, 22);
      ctx.clip();
      if (img) {
        ctx.drawImage(img, boxX, boxY, boxSize, boxSize);
      } else {
        ctx.fillStyle = '#E4DECF';
        ctx.fillRect(boxX, boxY, boxSize, boxSize);
        ctx.fillStyle = '#B8A88A';
        ctx.font = '56px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('🐾', W/2, boxY+boxSize*0.65);
      }
      ctx.restore();

      // code pill
      ctx.fillStyle = 'rgba(21,19,15,0.85)';
      var pillW = 70, pillH = 26, pillX = (W-pillW)/2, pillY = boxY+boxSize+12;
      roundRect(ctx, pillX, pillY, pillW, pillH, 13);
      ctx.fill();
      ctx.fillStyle = '#F0B74C';
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(code, W/2, pillY+17);

      // type name
      ctx.fillStyle = '#15130F';
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(nameEn, W/2, pillY+52);

      // nameTh small
      if (nameTh) {
        ctx.fillStyle = 'rgba(21,19,15,0.55)';
        ctx.font = '12px sans-serif';
        ctx.fillText(nameTh.substring(0,38), W/2, pillY+70);
      }

      // ── BOTTOM HALF: dark ──
      var darkY = H * 0.5;
      ctx.fillStyle = '#15130F';
      roundRect(ctx, 0, darkY-20, W, H-darkY+20, 0);
      ctx.fill();

      // "บุคลิกของ X คือ" label
      ctx.fillStyle = '#6B6459';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('บุคลิกของ ' + dogName + ' คือ', W/2, darkY+16);

      // Trait bars
      var barStartY = darkY + 32;
      TRAITS.forEach(function(t, i) {
        var rowY = barStartY + i * 50;
        ctx.fillStyle = '#FAF7F1';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(t.label, 24, rowY+14);
        ctx.fillStyle = '#6B6459';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(t.opp, W-24, rowY+14);
        // bar track
        ctx.fillStyle = '#3A352D';
        roundRect(ctx, 24, rowY+20, W-48, 8, 4);
        ctx.fill();
        // bar fill
        var barGrad = ctx.createLinearGradient(24, 0, W-48, 0);
        barGrad.addColorStop(0,'#F7CE7E');
        barGrad.addColorStop(1,'#F0B74C');
        ctx.fillStyle = barGrad;
        roundRect(ctx, 24, rowY+20, (W-48)*t.val, 8, 4);
        ctx.fill();
      });

      // DogBooster footer
      var footY = barStartY + TRAITS.length * 50 + 14;
      ctx.fillStyle = '#3A352D';
      roundRect(ctx, 16, footY, W-32, 46, 12);
      ctx.fill();
      ctx.fillStyle = '#FAF7F1';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('ฝึกสุนัขนิสัยดี มีความสุข', W/2, footY+20);
      ctx.fillStyle = '#6B6459';
      ctx.font = '11px sans-serif';
      ctx.fillText('ไม่บังคับ · ไม่ลงโทษ · DogBooster', W/2, footY+36);

      // Download
      var link = document.createElement('a');
      link.download = 'dogbooster-' + code + '.png';
      try { link.href = canvas.toDataURL('image/png'); } catch(e) { alert('ไม่สามารถสร้างรูปได้: ' + e.message); return; }
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    if (photo) {
      var img = new Image();
      img.onload = function() { draw(img); };
      img.src = photo;
    } else {
      draw(null);
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.arcTo(x+w, y, x+w, y+r, r);
    ctx.lineTo(x+w, y+h-r);
    ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h);
    ctx.arcTo(x, y+h, x, y+h-r, r);
    ctx.lineTo(x, y+r);
    ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
  }
  </script>
