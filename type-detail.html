ม่โดดเด่นที่สุด แต่สร้างสายสัมพันธ์ที่ลึกที่สุดกับมนุษย์</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">หยุดเห่าอย่างเข้าใจ</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">FSNA = Focused + Social + Sensitive + Active<br><span style=\"color:#B8860B\">\"สุนัขผู้แสนอ่อนโยน ที่เรียนรู้ว่าความมั่นใจที่แท้จริง เริ่มต้นจากการเชื่อมั่นในตัวเอง\" 🐾💛</span></p>\n              </div>\n\n            </div>", "ESNM": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🌱</span> Sensitive Soul</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">ESNM</div>\n                <h2 style=\"font-size:26px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.08\">THE GENTLE EXPLORER</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">นักสำรวจผู้แสนอ่อนโยน</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ฉันอยากรู้ว่าโลกเป็นอย่างไร... ขอเวลาให้ฉันค่อย ๆ ทำความรู้จักก็พอ\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">ESNM คือสุนัขที่มีความอยากรู้อยากเห็น แต่มีความระมัดระวังอยู่ในตัว — ไม่พุ่งเข้าหาโลกเหมือน ESCA ไม่ตอบสนองรุนแรงเหมือน ESNA พวกเขาเลือกใช้เวลาสังเกต เรียนรู้ และประเมินสถานการณ์ก่อนตัดสินใจ สนใจสิ่งใหม่แต่ไม่รีบร้อน</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"eye\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เจอคนใหม่ — เลือกสังเกตก่อน</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"compass\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สถานที่ใหม่ — สำรวจทีละมุม</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"search\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สิ่งแปลกใหม่ — เรียนรู้มากกว่าตอบสนองทันที</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:16px;font-weight:800;color:#F0B74C;line-height:1.35\">\"ทุกสิ่งมีเรื่องราวของมัน ถ้าฉันมีเวลาพอที่จะทำความเข้าใจ\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">พวกเขาไม่ได้กลัวโลก แต่ต้องการความมั่นใจก่อนจะเปิดใจ</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>ช่างสังเกต</div><div>มีสมาธิกับงานที่สนใจ</div><div>สุภาพ ไม่ก้าวร้าว</div><div>เรียนรู้ผ่านประสบการณ์</div><div>มั่นคงทางอารมณ์</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>ใช้เวลาปรับตัวนาน</div><div>ไม่มั่นใจในสถานการณ์ใหม่</div><div>หลีกเลี่ยงมากกว่ารับมือ</div><div>ดูเหมือนไม่สนใจ (กำลังประมวลผล)</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">ESNM มักถอยห่าง หลีกเลี่ยง ดมพื้น มองไปทางอื่น และไม่กล้าตัดสินใจ — ไม่ใช่สุนัขที่แสดงความเครียดเสียงดัง แต่เก็บความกังวลไว้ภายในจนหลายครั้งเจ้าของไม่ทันสังเกต</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ใจเย็น ไม่เร่งรัด</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เคารพพื้นที่ของสุนัข</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เรียนรู้แบบค่อยเป็นค่อยไป</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">สนับสนุนทีละขั้น</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ ESNM ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"ความกล้าที่จะเชื่อมั่นในตัวเอง\" — ESNM มีความสามารถมากกว่าที่ตัวเองคิด หลายครั้งรู้คำตอบแล้วแต่ไม่มั่นใจพอจะลงมือ บทเรียนสำคัญคือ \"ฉันสามารถก้าวออกไปได้ แม้ยังไม่มั่นใจ 100%\"</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span class=\"db\" style=\"font-size:22px\"><i data-lucide=\"volume-x\"></i></span></div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">หยุดเห่าอย่างเข้าใจ</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">คลาสที่เหมาะที่สุด — แม้ ESNM ไม่ได้เห่ารุนแรงเสมอไป แต่มีความกังวลและไม่มั่นใจซ่อนอยู่ ช่วยเพิ่มความมั่นใจ ลดความเครียด จัดการอารมณ์ และสร้างความรู้สึกปลอดภัย (รวมพื้นฐาน FBI ไว้แล้ว)</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — เปิดโอกาสให้ใช้จุดแข็งตามธรรมชาติ ทั้งการสังเกต การคิดวิเคราะห์ และการใช้จมูก</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">พัฒนาความมั่นใจ การควบคุมร่างกาย และการตัดสินใจ</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">สร้างความสำเร็จเล็ก ๆ อย่างต่อเนื่อง ส่งผลดีต่อความเชื่อมั่นในตัวเอง</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ ESNM</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม ESNM จะกลายเป็นสุนัขที่สุภาพ มั่นคง ช่างสังเกต เรียนรู้เก่ง และปรับตัวกับโลกได้อย่างสง่างาม — อาจไม่โดดเด่นที่สุดในทันที แต่เป็นสุนัขที่เติบโตขึ้นอย่างสวยงามที่สุดประเภทหนึ่ง</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">หยุดเห่าอย่างเข้าใจ</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">FBI</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">ESNM = Social + Curious + Sensitive + Moderate<br><span style=\"color:#B8860B\">\"สุนัขผู้แสนอ่อนโยน ที่กำลังเรียนรู้ว่าความมั่นใจไม่ได้เกิดจากการไม่กลัว แต่เกิดจากการกล้าก้าวต่อไปแม้ยังมีความกลัวอยู่บ้าง\" 🐾🌿</span></p>\n              </div>\n\n            </div>", "FSNM": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🌱</span> Sensitive Soul</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">FSNM</div>\n                <h2 style=\"font-size:25px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.08\">THE GENTLE COMPANION</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">เพื่อนคู่ใจผู้แสนอ่อนโยน</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ฉันไม่จำเป็นต้องเป็นใครที่โดดเด่น แค่ได้อยู่ข้าง ๆ คนที่รักก็เพียงพอแล้ว\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">FSNM คือสุนัขที่อ่อนโยนที่สุดในกลุ่ม Social Types — ไม่ต้องการเป็นจุดสนใจ ไม่ชอบแข่งขัน ไม่ชอบความวุ่นวาย สิ่งที่ให้ความสำคัญมากที่สุดคือ \"ความสงบ ความสัมพันธ์ และความมั่นคง\" ภายใต้ความสงบนั้นพวกเขามีความรู้สึกลึกซึ้งและให้คุณค่ากับความสัมพันธ์อย่างมาก</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"heart\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">ชอบอยู่ใกล้คนที่รัก ใช้ชีวิตเรียบง่าย</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"home\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">มีความสุขกับเรื่องเล็ก ๆ ประจำวัน</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"circle-check\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">\"เลี้ยงง่าย นิสัยดี ไม่ค่อยมีปัญหา\"</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:16px;font-weight:800;color:#F0B74C;line-height:1.35\">\"โลกจะน่าอยู่ เมื่อมีความปลอดภัยและความเข้าใจ\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">ไม่รีบเข้าหาแต่ก็ไม่หลีกหนี — ใช้เวลาสังเกต ทำความเข้าใจ และค่อย ๆ ปรับตัว เพียงต้องการรู้ว่าทุกอย่างปลอดภัยและคนที่รักยังอยู่ข้าง ๆ</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>อ่อนโยนและสุภาพ</div><div>สมดุลทางอารมณ์</div><div>ผูกพันกับครอบครัว</div><div>รับมือชีวิตประจำวันดี</div><div>เรียนรู้สม่ำเสมอ</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>ขาดมั่นใจในบางสถานการณ์</div><div>หลีกเลี่ยงมากกว่ารับมือ</div><div>ไม่ค่อยแสดงออก</div><div>พึ่งพาความคุ้นเคย</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">FSNM มักเงียบลง หลบเลี่ยง ไม่กล้าตัดสินใจ ขออยู่ใกล้เจ้าของมากขึ้น และขาดความมั่นใจ — หลายครั้งเจ้าของไม่ทันสังเกต เพราะพวกเขาไม่ใช่สุนัขที่แสดงออกอย่างรุนแรง</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ใจเย็น อบอุ่น</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">มีความสม่ำเสมอ</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ไม่กดดันมากเกินไป</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ให้เวลาในการเรียนรู้</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ FSNM ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"ความกล้าที่จะก้าวออกจากพื้นที่ปลอดภัย\" — FSNM มีความสุขกับสิ่งที่คุ้นเคย แต่ความสบายนั้นอาจทำให้หลีกเลี่ยงการเติบโต บทเรียนสำคัญคือ \"ฉันสามารถเผชิญสิ่งใหม่ได้ โดยไม่สูญเสียความเป็นตัวเอง\"</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:15px\">FBI</div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">Four Basic Instinct</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">FSNM มักไม่มีปัญหาพฤติกรรมรุนแรง แต่ FBI ช่วยสร้างความมั่นใจ การสื่อสาร ความสัมพันธ์ และการควบคุมอารมณ์ — เป็นรากฐานที่ช่วยให้ FSNM กล้าออกจาก Comfort Zone อย่างปลอดภัย</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — สร้างความมั่นใจ การรับรู้ร่างกาย และการตัดสินใจด้วยตัวเอง</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">กระตุ้นการคิดและการแก้ปัญหา พร้อมสร้างความมั่นใจผ่านความสำเร็จเล็ก ๆ</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เปิดโลกการเรียนรู้ใหม่ ๆ และเสริมสร้างความสัมพันธ์กับเจ้าของ</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ FSNM</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม FSNM จะกลายเป็นสุนัขที่สงบ มั่นคง อบอุ่น ปรับตัวเก่ง และมีความมั่นใจในตัวเอง — อาจไม่ตื่นเต้นที่สุด แต่เป็นสุนัขที่ทำให้บ้านกลายเป็นบ้าน และทำให้คนรอบตัวรู้สึกสบายใจเสมอ</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">FBI</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">FSNM = Focused + Social + Sensitive + Moderate<br><span style=\"color:#B8860B\">\"สุนัขผู้แสนอ่อนโยน ที่เชื่อว่าความสุขไม่ได้อยู่ที่การไปให้ไกลที่สุด แต่อยู่ที่การได้เดินไปพร้อมกับคนที่รัก\" 🐾🤍</span></p>\n              </div>\n\n            </div>", "ERCA": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🛡️</span> Guardian</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">ERCA</div>\n                <h2 style=\"font-size:23px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.1\">THE INDEPENDENT ADVENTURER</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">นักผจญภัยผู้รักอิสระ</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ฉันไม่ได้อยากหนีไปไหน ฉันแค่อยากออกไปค้นพบด้วยตัวเอง\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">ERCA คือสุนัขที่เต็มไปด้วยความมั่นใจ ความกล้า และความเป็นตัวของตัวเอง — รักการสำรวจ รักการตัดสินใจเอง และมักสนใจโลกภายนอกมากกว่าการขอความเห็นจากใคร หาก FSCA ชอบทำงานร่วมกับเจ้าของ ERCA คือสุนัขที่มักคิดว่า \"ฉันลองเองได้\"</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"compass\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สถานที่ใหม่ — อยากสำรวจเอง</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"search\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">กลิ่นใหม่ — อยากตามหาด้วยตัวเอง</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"lightbulb\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">\"ฉลาดมาก แต่เลือกฟังเฉพาะเวลาที่อยากฟัง\"</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:18px;font-weight:800;color:#F0B74C;line-height:1.35\">\"โลกมีอะไรให้ค้นหาอีกมาก\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">ERCA ให้ความสำคัญกับประสบการณ์ตรงมากกว่าการรอคำแนะนำ — เจอสิ่งที่น่าสนใจ ก็อยากเข้าไปดูด้วยตัวเอง</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>มั่นใจในตัวเองสูง</div><div>กล้าตัดสินใจ</div><div>เรียนรู้จากประสบการณ์</div><div>ปรับตัวเก่ง</div><div>แรงขับสำรวจสูง</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>สนใจสิ่งแวดล้อมกว่าเจ้าของ</div><div>ชอบตัดสินใจเอง</div><div>สมาธิเปลี่ยนตามสิ่งเร้า</div><div>ชอบความท้าทายเกินตัว</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">ERCA มักไม่ถอยหนี แต่จะพยายามควบคุมสถานการณ์ด้วยตัวเอง — วิ่งมากขึ้น ดึงสายจูง ไม่สนใจคำสั่ง หงุดหงิดง่าย ตัดสินใจเร็วเกินไป หลายครั้งความเครียดออกมาในรูปพลังงานที่มากเกินไป</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ชอบกิจกรรมกลางแจ้ง</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เปิดโอกาสให้เรียนรู้</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เข้าใจสุนัขที่รักอิสระ</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">สื่อสารสม่ำเสมอ</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ ERCA ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"การทำงานร่วมกับผู้อื่น\" — ERCA คิดและตัดสินใจเองได้สูง แต่บางครั้งลืมว่าการร่วมมือกับเจ้าของพาไปได้ไกลกว่าการลุยคนเดียว บทเรียนสำคัญคือ \"การเลือกฟัง ไม่ได้ทำให้สูญเสียอิสระ\"</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:15px\">FBI</div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">Four Basic Instinct</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">FBI ช่วยให้ ERCA เรียนรู้ว่าเจ้าของคือจุดอ้างอิง การสื่อสารสำคัญกว่าการคาดเดา และสมาธิอยู่ร่วมกับความอยากรู้อยากเห็นได้ — รากฐานสำคัญที่สุดสำหรับ ERCA</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"zap\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Agility Dog</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — เปิดโอกาสให้ใช้ทั้งพลังงาน ความกล้า และการแก้ปัญหา</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">ตอบสนองธรรมชาติของนักสำรวจ เปิดพื้นที่ให้ใช้ความสามารถในการค้นหา</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เพิ่มการควบคุมร่างกายและสมาธิ ซึ่งเป็นสิ่งที่ ERCA ต้องพัฒนาเพิ่ม</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ ERCA</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม ERCA จะกลายเป็นสุนัขที่มั่นใจ ฉลาด ปรับตัวเก่ง มีความเป็นผู้นำ และพร้อมเผชิญทุกสถานการณ์ — พาเจ้าของออกไปพบประสบการณ์ใหม่ ๆ ได้เสมอ ตราบใดที่เรียนรู้การทำงานร่วมกันเป็นทีม</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">FBI</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Agility Dog</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">ERCA = Explorative + Reserved + Confident + Active<br><span style=\"color:#B8860B\">\"สุนัขผู้รักอิสระ ที่เกิดมาเพื่อค้นพบโลกด้วยตัวเอง และเรียนรู้ว่าการเดินร่วมกันก็เป็นการผจญภัยที่งดงามเช่นกัน\" 🐾🌎</span></p>\n              </div>\n\n            </div>", "ERNA": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🛡️</span> Guardian</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">ERNA</div>\n                <h2 style=\"font-size:25px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.08\">THE VIGILANT SCOUT</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">ผู้เฝ้ามองโลกอย่างระมัดระวัง</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ฉันอยากรู้ว่าเกิดอะไรขึ้น... เพื่อให้แน่ใจว่าทุกอย่างปลอดภัย\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">ERNA คือสุนัขที่ตื่นตัวต่อสิ่งรอบตัวอยู่เสมอ เป็นนักสังเกตการณ์โดยธรรมชาติ — คอยมอง คอยฟัง คอยจับความเปลี่ยนแปลง ต่างจาก ESNA ที่แสดงความกังวลผ่านการเข้าสังคม ERNA มักเก็บระยะห่าง สังเกตก่อน พวกเขาไม่ได้กลัวโลก แต่รู้สึกว่าหน้าที่ของตัวเองคือ \"ต้องรู้ว่าเกิดอะไรขึ้นรอบตัว\"</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"eye\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เจอคนใหม่ — สังเกตก่อนเสมอ</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"ear\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เจอเสียงใหม่ — ฟังและประเมิน</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"shield-alert\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">มีสิ่งผิดปกติ — เป็นคนแรกที่รู้ตัว</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:17px;font-weight:800;color:#F0B74C;line-height:1.35\">\"การระวังตัวคือหนทางสู่ความปลอดภัย\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">โลกของ ERNA เต็มไปด้วยข้อมูลที่ต้องประเมินอยู่ตลอดเวลา — พวกเขามีระบบเตือนภัยภายในที่ทำงานหนักกว่าปกติ</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>สังเกตสิ่งผิดปกติไว</div><div>สัญชาตญาณระวังภัยสูง</div><div>รอบคอบ</div><div>รับผิดชอบสิ่งแวดล้อม</div><div>ซื่อสัตย์ต่อคนที่ไว้ใจ</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>Reactive ได้ง่าย</div><div>เห่าเตือนง่าย</div><div>ผ่อนคลายได้ยาก</div><div>ใช้พลังงานกับความกังวลมาก</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">ERNA มักเห่าเตือน จ้องมองสิ่งเร้า เดินตรวจพื้นที่ ไม่ยอมพักผ่อน และตื่นตัวตลอดเวลา — หลายครั้งเจ้าของเข้าใจว่าดื้อ แต่จริง ๆ พวกเขากำลังพยายามทำหน้าที่ปกป้องตัวเองและครอบครัว</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ใจเย็น มั่นคงทางอารมณ์</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ไม่ตอบกังวลด้วยกังวล</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เข้าใจ Reactive</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ช่วยให้รู้สึกปลอดภัย</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ ERNA ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"การปล่อยวางความรับผิดชอบที่ไม่จำเป็น\" — ERNA มักรู้สึกว่าต้องคอยดูแลทุกอย่าง ตรวจสอบทุกเสียง บทเรียนสำคัญคือ \"ไม่ใช่ทุกเรื่องที่ฉันต้องจัดการ\" เมื่อเรียนรู้ว่าเจ้าของรับหน้าที่ได้เช่นกัน พวกเขาจะเริ่มผ่อนคลาย</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span class=\"db\" style=\"font-size:22px\"><i data-lucide=\"volume-x\"></i></span></div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">หยุดเห่าอย่างเข้าใจ</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">คลาสที่เหมาะที่สุด — ปัญหาหลักของ ERNA เกี่ยวกับการเห่าเตือน ความกังวล ความไวต่อสิ่งเร้า และการตื่นตัวมากเกินไป ช่วยควบคุมอารมณ์ สร้างความมั่นใจ และลดความเครียดสะสม (รวมพื้นฐาน FBI ไว้แล้ว)</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เปลี่ยนการเฝ้าระวังให้เป็นการใช้สมองอย่างสร้างสรรค์ และช่วยลดความเครียดได้ดีมาก</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">สร้างสมาธิ และเพิ่มความสามารถในการควบคุมตัวเอง</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เรียนรู้การโฟกัสกับเจ้าของ แทนการโฟกัสกับสิ่งแวดล้อมตลอดเวลา</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ ERNA</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม ERNA จะกลายเป็นสุนัขที่รอบคอบ มั่นคง มีสติ รับมือกับสถานการณ์ได้ดี และเป็นผู้สังเกตการณ์ที่ยอดเยี่ยม — ไม่ใช่สุนัขที่ไร้ความกลัว แต่เรียนรู้วิธีอยู่ร่วมกับความกังวลอย่างสมดุล</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">หยุดเห่าอย่างเข้าใจ</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">ERNA = Explorative + Reserved + Sensitive + Active<br><span style=\"color:#B8860B\">\"สุนัขผู้ตื่นตัวต่อโลกเสมอ ที่กำลังเรียนรู้ว่าไม่จำเป็นต้องแบกรับทุกอย่างไว้คนเดียว\" 🐾🛡️</span></p>\n              </div>\n\n            </div>", "FRCA": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🛡️</span> Guardian</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">FRCA</div>\n                <h2 style=\"font-size:25px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.08\">THE QUIET PROFESSIONAL</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">มืออาชีพผู้สุขุม</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ฉันไม่จำเป็นต้องเป็นจุดสนใจ แค่ทำสิ่งที่ควรทำให้ดีที่สุดก็พอ\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">FRCA คือสุนัขที่มีความมั่นใจสูง แต่ไม่ได้แสดงออกอย่างหวือหวา — ไม่ชอบเรียกร้องความสนใจ ไม่ตื่นเต้นกับทุกสิ่ง ดูนิ่ง สุขุม และเป็นตัวของตัวเองสูง พวกเขาประเมินสถานการณ์ก่อนลงมือ ไม่ผลีผลาม แต่เมื่อถึงเวลาตัดสินใจก็ทำได้มั่นคงและแม่นยำ — หาก ERCA คือนักผจญภัย FRCA คือนักวางแผน</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"eye\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สถานการณ์ใหม่ — สังเกตและวิเคราะห์ก่อน</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"target\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เลือกลงมือเมื่อเห็นว่าควรทำ</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"shield\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">ไม่ต้องตอบสนองต่อทุกสิ่งที่เกิดขึ้น</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:16px;font-weight:800;color:#F0B74C;line-height:1.35\">\"ความมั่นใจไม่ได้มาจากความเร็ว แต่มาจากความเข้าใจ\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">พวกเขาไม่ได้หลีกเลี่ยงโลก เพียงแต่ไม่จำเป็นต้องตอบสนองต่อทุกสิ่งที่เกิดขึ้น</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>มั่นคงทางอารมณ์</div><div>ตัดสินใจดี คิดก่อนทำ</div><div>มีสมาธิสูง</div><div>เรียนรู้เป็นระบบ</div><div>พึ่งพาตัวเองได้</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>ดูห่างเหิน</div><div>ทำเฉพาะสิ่งที่มีเหตุผล</div><div>ชอบตัดสินใจเอง</div><div>ขาดความยืดหยุ่นเมื่อเปลี่ยนกะทันหัน</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">FRCA มักถอนตัว ไม่สนใจสิ่งรอบตัว ดื้อเงียบ ตัดสินใจเองมากขึ้น และลดการมีปฏิสัมพันธ์ — ไม่ใช่สุนัขที่ระเบิดอารมณ์ แต่เป็นสุนัขที่ปิดตัวเองเมื่อรู้สึกกดดัน</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">มีความสม่ำเสมอ</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">สื่อสารชัดเจน</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เคารพความเป็นตัวของตัวเอง</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ฝึกแบบมีเป้าหมาย</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ FRCA ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"การเปิดใจต่อการทำงานร่วมกัน\" — FRCA พึ่งพาตัวเองสูงจนบางครั้งเลือกแก้ปัญหาทุกอย่างด้วยตัวเอง บทเรียนสำคัญคือ \"การร่วมมือไม่ได้ทำให้ฉันอ่อนแอลง\" เมื่อมองเจ้าของเป็นคู่ทีม ศักยภาพจะเพิ่มขึ้นอย่างมาก</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:15px\">FBI</div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">Four Basic Instinct</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">FBI ช่วยให้ FRCA สร้างการสื่อสารกับเจ้าของ เพิ่มแรงจูงใจในการทำงานร่วมกัน พัฒนาสมาธิและความร่วมมือ — เปลี่ยนจากการทำงานคนเดียวเป็นการทำงานเป็นทีม</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"activity\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Fitness</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">คลาสที่เหมาะที่สุด — ตอบโจทย์ทั้งสมาธิ ความแม่นยำ และการควบคุมร่างกาย</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Nose Work</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">เปิดโอกาสให้ใช้ความสามารถในการคิดวิเคราะห์และแก้ปัญหา</div></div></div>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"sparkles\"></i></span><div><div style=\"font-weight:800;font-size:14px\">Dog Show Tricks</div><div style=\"font-size:12px;color:#6B6459;line-height:1.5;margin-top:2px\">พัฒนาการสื่อสารและความร่วมมือกับเจ้าของ</div></div></div>\n              </div>\n\n              <div style=\"background:linear-gradient(160deg,#FBEFD6,#F7E4B8);border:1px solid #F0D89A;border-radius:18px;padding:20px;margin-top:24px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#8A6A1E;margin-bottom:10px\"><span class=\"db\" style=\"font-size:17px\"><i data-lucide=\"award\"></i></span>ศักยภาพสูงสุดของ FRCA</div>\n                <p style=\"font-size:13px;color:#5A4A28;line-height:1.65\">เมื่อได้รับการพัฒนาอย่างเหมาะสม FRCA จะกลายเป็นสุนัขที่สุขุม มั่นคง มีสมาธิ ฉลาดในการตัดสินใจ และทำงานได้อย่างน่าเชื่อถือ — อาจไม่โดดเด่นที่สุดในสนาม แต่เป็นสุนัขที่หลายคนไว้วางใจมากที่สุด</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"graduation-cap\"></i></span>คลาสที่เหมาะที่สุด</div>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#15130F;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥇</span><span style=\"font-weight:800;font-size:14px;color:#F0B74C;flex:1\">FBI</span><span style=\"font-size:11px;color:#7E7668;font-weight:700\">รากฐาน</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥈</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Fitness</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🥉</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Nose Work</span></div>\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:13px 15px\"><span style=\"font-size:18px\">🏅</span><span style=\"font-weight:800;font-size:14px;color:#15130F;flex:1\">Dog Show Tricks</span></div>\n              </div>\n\n              <div style=\"text-align:center;margin-top:26px;padding:0 6px\">\n                <p style=\"font-size:14.5px;font-weight:700;color:#15130F;line-height:1.6\">FRCA = Focused + Reserved + Confident + Active<br><span style=\"color:#B8860B\">\"สุนัขผู้สุขุม มั่นใจ และมีวินัย ที่เชื่อว่าการกระทำสำคัญกว่าคำพูด\" 🐾🎯</span></p>\n              </div>\n\n            </div>", "FRNA": "<!-- HERO -->\n            <div style=\"position:relative;background:linear-gradient(165deg,#F7CE7E,#F0B74C 55%,#E0A02F);padding-bottom:26px\">\n              <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 14px,rgba(255,255,255,.07) 14px,rgba(255,255,255,.07) 28px)\"></div>\n              <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0\">\n                <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(21,19,15,.16);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:#15130F;cursor:pointer\" onclick=\"history.back()\"><span class=\"db\" style=\"font-size:19px\"><i data-lucide=\"arrow-left\"></i></span></div>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:11px;font-weight:800;padding:5px 12px;border-radius:100px\"><span style=\"font-size:12px\">🛡️</span> Guardian</div>\n              </div>\n              <div style=\"position:relative;display:flex;justify-content:center;margin-top:10px\">\n                <div style=\"width:172px;height:172px;border-radius:26px;background:#E4DECF;display:flex;align-items:center;justify-content:center\"><span class=\"db\" style=\"font-size:56px;color:#B8A88A\"><i data-lucide=\"paw-print\"></i></span></div>\n              </div>\n              <div style=\"position:relative;text-align:center;margin-top:14px;padding:0 24px\">\n                <div class=\"mono\" style=\"display:inline-flex;align-items:center;gap:3px;background:rgba(21,19,15,.85);color:#F0B74C;font-size:13px;font-weight:800;letter-spacing:.16em;padding:4px 14px;border-radius:100px\">FRNA</div>\n                <h2 style=\"font-size:28px;font-weight:800;letter-spacing:-.01em;color:#15130F;margin-top:11px;line-height:1.05\">THE GUARDIAN</h2>\n                <div style=\"font-size:15px;font-weight:700;color:#5A4A28;margin-top:4px\">ผู้พิทักษ์ผู้เงียบสงบ</div>\n                <p style=\"font-size:13.5px;font-style:italic;color:#5A4A28;line-height:1.55;margin-top:12px\">\"ฉันไม่ได้ไม่ไว้ใจโลก... ฉันแค่ต้องแน่ใจก่อนว่ามันปลอดภัย\"</p>\n              </div>\n            </div>\n\n            <!-- BODY -->\n            <div style=\"padding:26px 24px 30px\">\n\n              <div class=\"seclabel\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"sparkles\"></i></span>ภาพรวมบุคลิกภาพ</div>\n              <p class=\"body\">FRNA คือสุนัขที่มีความระมัดระวังสูง สุขุม ช่างสังเกต และรับผิดชอบต่อสิ่งรอบตัวอย่างจริงจัง — ไม่ชอบเข้าสังคมทันที ไม่เปิดใจให้ทุกคน แต่เมื่อไว้ใจใครแล้วจะภักดีอย่างลึกซึ้งและพร้อมปกป้อง หาก ERNA คือ \"ผู้เฝ้าระวัง\" FRNA คือ \"ผู้พิทักษ์\" ที่รู้สึกว่ามีหน้าที่รับผิดชอบต่อโลกใบนั้นด้วย</p>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"eye\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">เจอคนใหม่ — สังเกตก่อนเสมอ</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"scan-search\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สถานการณ์ใหม่ — ประเมินก่อนตัดสินใจ</span></div>\n                <div style=\"display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E4DECF;border-radius:13px;padding:12px 14px\"><span class=\"db\" style=\"font-size:17px;color:#B8860B;flex-shrink:0\"><i data-lucide=\"shield-alert\"></i></span><span style=\"font-size:13px;color:#2E2A23;line-height:1.5\">สิ่งผิดปกติ — เตรียมพร้อมรับมือ</span></div>\n              </div>\n\n              <div style=\"background:#15130F;border-radius:18px;padding:20px;margin-top:24px;text-align:center\">\n                <div style=\"font-size:11px;font-weight:800;letter-spacing:.06em;color:#A39B8C;text-transform:uppercase;margin-bottom:8px\">วิธีมองโลก</div>\n                <div style=\"font-size:18px;font-weight:800;color:#F0B74C;line-height:1.35\">\"ความปลอดภัยต้องมาก่อน\"</div>\n                <p style=\"font-size:13px;color:#A39B8C;line-height:1.6;margin-top:10px\">FRNA ไม่ได้มองโลกในแง่ร้าย แต่เป็นสุนัขที่มักคิดถึงความเป็นไปได้ต่าง ๆ ก่อนเสมอ</p>\n              </div>\n\n              <div style=\"display:flex;gap:12px;margin-top:24px\">\n                <div style=\"flex:1;background:#E7F0EA;border:1px solid #CBE0D2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#4A7359;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"circle-check\"></i></span>จุดแข็ง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#3C5E49;line-height:1.4\">\n                    <div>รับผิดชอบสูง</div><div>รอบคอบ</div><div>ภักดี</div><div>สังเกตเก่ง</div><div>มีวินัย</div>\n                  </div>\n                </div>\n                <div style=\"flex:1;background:#FBEEE6;border:1px solid #EAD3C2;border-radius:16px;padding:16px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#A65A38;margin-bottom:11px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"triangle-alert\"></i></span>ต้องระวัง</div>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:#8A4B30;line-height:1.4\">\n                    <div>ระแวงต่อสิ่งแปลกใหม่</div><div>Reactive จากความรับผิดชอบ</div><div>ผ่อนคลายยาก</div><div>ไวต่อสิ่งเร้า</div>\n                  </div>\n                </div>\n              </div>\n\n              <div style=\"border:1.5px solid #E4DECF;border-radius:16px;padding:16px;margin-top:16px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#15130F;margin-bottom:8px\"><span class=\"db\" style=\"font-size:16px;color:#C77B53\"><i data-lucide=\"activity\"></i></span>เมื่อเกิดความเครียด</div>\n                <p style=\"font-size:13px;color:#48433A;line-height:1.6\">FRNA มักเห่าเตือน จ้องสิ่งเร้า เฝ้าระวังมากขึ้น ไม่ยอมพักผ่อน และควบคุมสิ่งแวดล้อมมากขึ้น — หลายครั้งเจ้าของเข้าใจผิดว่าดื้อหรือหวงพื้นที่ แต่จริง ๆ FRNA กำลังพยายามรับผิดชอบในสิ่งที่คิดว่าเป็นหน้าที่ของตัวเอง</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"heart-handshake\"></i></span>เจ้าของในอุดมคติ</div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">มั่นคงทางอารมณ์</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">เป็นผู้นำที่ชัดเจน</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">ใจเย็น สม่ำเสมอ</span>\n                <span style=\"background:#FBEFD6;color:#B8860B;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:100px\">สร้างความรู้สึกปลอดภัย</span>\n              </div>\n\n              <div style=\"background:#1C1A15;border:1px solid #3A352D;border-radius:16px;padding:16px;margin-top:18px\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#F0B74C;margin-bottom:7px\"><span class=\"db\" style=\"font-size:16px\"><i data-lucide=\"lightbulb\"></i></span>สิ่งที่ FRNA ต้องเรียนรู้</div>\n                <p style=\"font-size:12.5px;color:#A39B8C;line-height:1.6\">\"การไว้วางใจให้คนอื่นรับผิดชอบบ้าง\" — FRNA มักแบกภาระทางอารมณ์มากเกินไป คอยปกป้องและจัดการทุกอย่าง บทเรียนสำคัญคือ \"ฉันไม่จำเป็นต้องเป็นคนแก้ปัญหาทุกเรื่อง\" เมื่อเรียนรู้ที่จะไว้วางใจเจ้าของ ความเครียดจะลดลง</p>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:26px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"route\"></i></span>เส้นทางหลัก · Core Program</div>\n              <div style=\"background:#15130F;border-radius:18px;padding:18px;display:flex;gap:13px\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:rgba(240,183,76,.16);color:#F0B74C;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span class=\"db\" style=\"font-size:22px\"><i data-lucide=\"volume-x\"></i></span></div>\n                <div><div style=\"font-weight:800;font-size:14px;color:#FAF7F1;margin-bottom:3px\">หยุดเห่าอย่างเข้าใจ</div><p style=\"font-size:12.5px;color:#A39B8C;line-height:1.55\">คลาสที่เหมาะที่สุด — FRNA ได้ประโยชน์มากที่สุด เพราะปัญหาหลักเกี่ยวกับการเห่าเตือน ความกังวล การเฝ้าระวังเกินพอดี ช่วยสร้างความมั่นใจ ลดภาระทางอารมณ์ และเข้าใจบทบาทของตัวเองใหม่ (รวมพื้นฐาน FBI ไว้แล้ว)</p></div>\n              </div>\n\n              <div class=\"seclabel\" style=\"margin-top:24px\"><span class=\"db\" style=\"font-size:14px\"><i data-lucide=\"trending-up\"></i></span>เส้นทางต่อยอด · Growth Path</div>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #E4DECF;border-radius:14px;padding:14px\"><span class=\"db\" style=\"font-size:19px;color:#B8860B;flex-shrink:0;margin-top:1px\"><i data-lucide=\"search\"></i></span><div><div style=\"font-weight:800;font-size:14px\">N
