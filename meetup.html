<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Meetup · วิดีโอเรียนย้อนหลัง — DogBooster</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="icon" href="/assets/logo.png">
<link rel="apple-touch-icon" href="/assets/logo.png">
<meta name="theme-color" content="#15130F">
<meta name="robots" content="noindex,nofollow">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #F0B74C; --gold-dark: #E0A02F;
    --dark: #15130F; --dark2: #1C1A15;
    --cream: #FAF7F1; --sand: #E7E2D7; --muted: #A39B8C; --text-body: #48433A;
    --amber: #B8860B;
  }
  html, body {
    font-family: 'LINE Seed Sans TH', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; background: var(--sand); min-height: 100dvh;
  }
  .page { max-width: 760px; margin: 0 auto; min-height: 100dvh; background: var(--cream); }
  .header {
    background: var(--dark); padding: 52px 22px 26px; position: relative; overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top: -60px; right: -40px; width: 240px; height: 240px;
    border-radius: 50%; background: radial-gradient(circle, rgba(240,183,76,.18), transparent 70%);
  }
  .back-btn {
    background: none; border: none; cursor: pointer; color: var(--cream);
    display: flex; align-items: center; gap: 8px; font-family: inherit; font-size: 14px;
    font-weight: 700; padding: 0; margin-bottom: 18px; position: relative;
  }
  .back-btn svg { width: 20px; height: 20px; }
  .header .tag {
    display: inline-block; font-size: 11px; font-weight: 800; color: var(--gold);
    letter-spacing: .04em; margin-bottom: 8px; position: relative;
  }
  .header h1 { font-size: 24px; font-weight: 800; color: var(--cream); position: relative; line-height: 1.35; }
  .header p { font-size: 13.5px; color: var(--muted); margin-top: 8px; position: relative; line-height: 1.6; }
  .body { padding: 24px 20px 60px; }

  /* ---- Gate (ใส่รหัส) ---- */
  .gate {
    background: #fff; border: 1px solid #E4DECF; border-radius: 18px;
    padding: 26px 22px; max-width: 420px; margin: 10px auto 0; text-align: center;
    box-shadow: 0 14px 40px -22px rgba(0,0,0,.3);
  }
  .gate .lock {
    width: 60px; height: 60px; border-radius: 50%; background: #FFF3DC;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 14px;
  }
  .gate .lock svg { width: 28px; height: 28px; color: var(--gold-dark); }
  .gate h2 { font-size: 18px; font-weight: 800; color: var(--dark); margin-bottom: 6px; }
  .gate p { font-size: 13.5px; color: var(--text-body); line-height: 1.7; margin-bottom: 18px; }
  .gate input {
    width: 100%; font-family: inherit; font-size: 16px; text-align: center; letter-spacing: .06em;
    padding: 14px 16px; border: 1.5px solid #E0DAD0; border-radius: 12px; background: var(--cream);
    color: var(--dark); font-weight: 700; outline: none;
  }
  .gate input:focus { border-color: var(--gold); }
  .gate button {
    width: 100%; margin-top: 12px; font-family: inherit; font-weight: 800; font-size: 15px;
    padding: 14px; border: none; border-radius: 12px; background: var(--gold); color: var(--dark);
    cursor: pointer; box-shadow: 0 8px 20px -8px rgba(240,183,76,.5);
  }
  .gate button:disabled { opacity: .6; cursor: default; }
  .gate .err { color: #C0392B; font-size: 13px; font-weight: 700; margin-top: 12px; min-height: 18px; }
  .gate .hint { margin-top: 16px; font-size: 12.5px; color: var(--muted); }
  .gate .hint a { color: var(--gold-dark); font-weight: 800; text-decoration: none; }

  /* ---- Video list ---- */
  .batch-name {
    display: inline-flex; align-items: center; gap: 8px; background: #FFF3DC; color: var(--amber);
    font-size: 13px; font-weight: 800; padding: 7px 16px; border-radius: 100px; margin-bottom: 20px;
  }
  /* ---- Playlist ---- */
  .player-frame {
    border-radius: 16px; overflow: hidden; background: var(--dark2);
    position: relative; width: 100%; aspect-ratio: 16/9; margin-bottom: 12px;
  }
  .player-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .now-title { font-size: 16px; font-weight: 800; color: var(--dark); line-height: 1.4; margin-bottom: 18px; }
  .pl-head {
    display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 800;
    color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px;
  }
  .pl-list { display: flex; flex-direction: column; gap: 8px; }
  .pl-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px;
    background: #fff; border: 1px solid #E7E1D4; cursor: pointer; text-align: left; width: 100%;
    font-family: inherit; transition: border-color .15s, background .15s;
  }
  .pl-item:hover { border-color: var(--gold); }
  .pl-item.active { background: #FFF6E4; border-color: var(--gold); }
  .pl-thumb {
    width: 92px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; flex-shrink: 0;
    background: var(--dark2); position: relative;
  }
  .pl-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pl-thumb .play {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.28); color: #fff;
  }
  .pl-thumb .play svg { width: 22px; height: 22px; }
  .pl-item.active .pl-thumb .play { background: rgba(240,183,76,.35); color: var(--gold); }
  .pl-meta { flex: 1; min-width: 0; }
  .pl-n { font-size: 11px; font-weight: 800; color: var(--gold-dark); }
  .pl-t {
    font-size: 14px; font-weight: 700; color: var(--dark); line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 30px 0; }
  .cta {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: #06C755; color: #fff; text-decoration: none;
    font-weight: 800; font-size: 15px; padding: 15px; border-radius: 14px; margin-top: 20px;
  }
  .cta svg { width: 18px; height: 18px; }

  @media (min-width: 820px){
    .page{ box-shadow: 0 0 60px rgba(0,0,0,.08); }
    .body{ padding: 30px 40px 90px; }
    .playlist-wrap { display: grid; grid-template-columns: 1.6fr 1fr; gap: 24px; align-items: start; }
    .player-col { position: sticky; top: 24px; }
    html{ background: var(--sand); }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <button class="back-btn" onclick="goBack()">
      <i data-lucide="arrow-left"></i> กลับ
    </button>
    <span class="tag">🐾 Meet up DogBooster</span>
    <h1>วิดีโอเรียน</h1>
    <p>เฉพาะผู้ร่วม Meet up เท่านั้น กรุณาไม่เผยแพร่ต่อ<br>รหัสการเข้าดูจะเปลี่ยนทุก 30 วัน</p>
  </div>

  <div class="body">
    <!-- Gate -->
    <div id="gate" class="gate">
      <div class="lock"><i data-lucide="lock"></i></div>
      <h2>ใส่รหัสผ่าน</h2>
      <p>รหัสนี้เฉพาะผู้มาร่วม Meetup<br>กรุณาอย่าเผยแพร่ต่อ 🙏🏼</p>
      <input id="code" type="text" inputmode="text" autocomplete="off"
        placeholder="ใส่รหัส" onkeydown="if(event.key==='Enter')unlock()">
      <button id="unlockBtn" onclick="unlock()">ปลดล็อกดูวิดีโอ</button>
      <div id="err" class="err"></div>
      <div class="hint">ยังไม่มีรหัส? <a href="https://lin.ee/PTaq5zs" target="_blank" rel="noopener">ทักไลน์เรา</a></div>
    </div>

    <!-- Videos (hidden until unlocked) -->
    <div id="videos" style="display:none;">
      <div id="batchName" class="batch-name"></div>
      <div class="playlist-wrap">
        <div class="player-col">
          <div class="player-frame"><iframe id="player" src="" title="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>
        </div>
        <div class="list-col">
          <div class="pl-head"><i data-lucide="list-video" style="width:16px;height:16px;"></i> เพลย์ลิสต์ <span id="plCount"></span></div>
          <div id="plList" class="pl-list"></div>
        </div>
      </div>
      <a href="https://lin.ee/PTaq5zs" target="_blank" rel="noopener" class="cta">
        <i data-lucide="message-circle"></i> สอบถามสนใจเรียนเพิ่มเติม
      </a>
    </div>
  </div>
</div>

<script>
  function goBack() {
    if (document.referrer && document.referrer.indexOf(location.host) !== -1) history.back();
    else location.href = 'school.html';
  }
  function esc(s) { return String(s || '').replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  }); }

  async function unlock() {
    var btn = document.getElementById('unlockBtn');
    var code = document.getElementById('code').value.trim();
    var err = document.getElementById('err');
    err.textContent = '';
    if (!code) { err.textContent = 'กรุณาใส่รหัส'; return; }
    btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...';
    try {
      var r = await fetch('/api/meetup?unlock=1', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code })
      });
      var data = await r.json();
      if (!r.ok) { throw new Error(data.error || 'รหัสไม่ถูกต้อง'); }
      showVideos(data);
    } catch (e) {
      err.textContent = e.message || 'รหัสไม่ถูกต้อง';
      btn.disabled = false; btn.textContent = 'ปลดล็อกดูวิดีโอ';
    }
  }

  // วิดีโอต้อนรับ (เล่นเป็นคลิปแรกของทุกรุ่น)
  var INTRO_VIDEO = { title: 'วิดีโอต้อนรับ', youtube: 'S-FH2OaL9ng' };
  var PLAYLIST = [];

  function playAt(i) {
    var v = PLAYLIST[i]; if (!v) return;
    var iframe = document.getElementById('player');
    iframe.src = 'https://www.youtube.com/embed/' + encodeURIComponent(v.youtube) + '?rel=0&autoplay=1';
    iframe.title = v.title || '';
    var items = document.querySelectorAll('.pl-item');
    for (var k = 0; k < items.length; k++) items[k].classList.toggle('active', k === i);
  }

  function showVideos(data) {
    var videos = data.videos || [];
    document.getElementById('gate').style.display = 'none';
    document.getElementById('videos').style.display = 'block';
    document.getElementById('batchName').innerHTML =
      '<i data-lucide="graduation-cap" style="width:16px;height:16px;"></i> Meet up DogBooster';

    // วิดีโอต้อนรับก่อน แล้วตามด้วยวิดีโอของรุ่น
    PLAYLIST = [INTRO_VIDEO].concat(videos);
    document.getElementById('plCount').textContent = '(' + PLAYLIST.length + ')';

    document.getElementById('plList').innerHTML = PLAYLIST.map(function (v, i) {
      var t = esc(v.title || ('วิดีโอ ' + (i + 1)));
      return '<button class="pl-item" onclick="playAt(' + i + ')">' +
        '<div class="pl-thumb">' +
          '<img src="https://img.youtube.com/vi/' + encodeURIComponent(v.youtube) + '/mqdefault.jpg" alt="" loading="lazy">' +
          '<span class="play"><i data-lucide="play"></i></span>' +
        '</div>' +
        '<div class="pl-meta"><div class="pl-n">EP ' + (i + 1) + '</div><div class="pl-t">' + t + '</div></div>' +
      '</button>';
    }).join('');

    playAt(0);
    if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();
    window.scrollTo(0, 0);
  }

  document.addEventListener('DOMContentLoaded', function () {
    function init() {
      if (window.lucide && window.lucide.createIcons) { window.lucide.createIcons(); }
      else { setTimeout(init, 80); }
    }
    init();
    document.getElementById('code').focus();
  });
</script>
</body>
</html>
