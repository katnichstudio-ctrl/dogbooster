<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>DogBooster — เข้าสู่ระบบ</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #F0B74C;
      --gold-light: #F7CE7E;
      --gold-dark: #E0A02F;
      --gold-dim: rgba(240,183,76,.16);
      --dark: #15130F;
      --dark-mid: #3A352D;
      --cream: #FAF7F1;
      --muted: #A39B8C;
      --green-line: #06C755;
      --green-line-hover: #05b34d;
    }

    html, body {
      height: 100%;
      font-family: 'LINE Seed Sans TH', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--gold);
      color: var(--dark);
      overflow: hidden;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100dvh;
      background: linear-gradient(160deg, var(--gold-light), var(--gold) 55%, var(--gold-dark));
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px 6px;
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
      position: relative;
      z-index: 10;
    }
    .statusbar-icons {
      display: flex;
      gap: 7px;
    }
    .statusbar-icons svg {
      width: 15px;
      height: 15px;
      stroke-width: 1.75;
    }

    /* Path motif */
    .path-motif {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      pointer-events: none;
      opacity: .5;
    }

    /* Hero zone */
    .hero {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Logo circle */
    .logo-ring {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,.92);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 30px 50px -20px rgba(120,80,0,.5);
      animation: pulse 5s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }
    .logo-ring img {
      width: 128px;
      height: 128px;
      object-fit: contain;
    }

    /* Floating chips */
    .chip {
      position: absolute;
      font-size: 12px;
      font-weight: 800;
      padding: 9px 13px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      z-index: 3;
    }
    .chip svg {
      width: 14px;
      height: 14px;
      stroke-width: 1.75;
      flex-shrink: 0;
    }
    .chip--light { background: #fff; color: var(--dark); box-shadow: 0 12px 24px -10px rgba(0,0,0,.35); }
    .chip--dark  { background: var(--dark); color: var(--gold); box-shadow: 0 12px 24px -10px rgba(0,0,0,.45); }

    .chip-force-free   { top: 18%; left: 4%;  animation: float 3.6s ease-in-out infinite; }
    .chip-plus-khanom  { top: 18%; right: 4%; animation: float 3.4s ease-in-out .2s infinite; }
    .chip-create-path  { top: 9%;  left: 50%; transform: translateX(-50%); animation: float 4.2s ease-in-out .6s infinite; }
    .chip-shaping      { top: 48%; left: 2%;  animation: float 3.9s ease-in-out .3s infinite; }
    .chip-plus-toy     { top: 48%; right: 2%; animation: float 4.1s ease-in-out .5s infinite; }
    .chip-no-force     { bottom: 36%; left: 14%; animation: float 3.7s ease-in-out .7s infinite; }
    .chip-no-punish    { bottom: 36%; right: 10%; animation: float 3.5s ease-in-out .9s infinite; }

    /* Bottom sheet */
    .sheet {
      background: var(--dark);
      border-radius: 34px 34px 0 0;
      padding: 28px 28px env(safe-area-inset-bottom, 28px);
      padding-bottom: calc(28px + env(safe-area-inset-bottom, 0px));
    }

    .sheet-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--gold-dim);
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
      padding: 7px 13px;
      border-radius: 100px;
      white-space: nowrap;
    }
    .sheet-tag svg {
      width: 14px; height: 14px; stroke-width: 1.75; flex-shrink: 0;
    }

    .sheet-title {
      font-size: clamp(22px, 6vw, 27px);
      font-weight: 800;
      letter-spacing: -.01em;
      line-height: 1.18;
      margin-top: 14px;
      color: var(--cream);
    }

    /* LINE button */
    .btn-line {
      margin-top: 20px;
      width: 100%;
      background: var(--green-line);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-family: inherit;
      font-weight: 800;
      font-size: 17px;
      padding: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-line:hover, .btn-line:focus-visible { background: var(--green-line-hover); }
    .btn-line:active { transform: scale(.98); }

    .line-mark {
      width: 26px;
      height: 26px;
      background: #fff;
      border-radius: 7px;
      color: var(--green-line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      flex-shrink: 0;
    }

    /* Trust row */
    .trust {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
    }
    .trust-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
    }
    .trust-item svg { width: 14px; height: 14px; stroke-width: 1.75; color: var(--gold); flex-shrink: 0; }
    .trust-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--dark-mid); }

    /* Animations */
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }
    .chip-create-path { animation-name: float-center; }
    @keyframes float-center {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-7px); }
    }
  </style>
</head>
<body>
  <div class="screen">

    <!-- SVG path motif -->
    <svg class="path-motif" viewBox="0 0 404 480" xmlns="http://www.w3.org/2000/svg">
      <path d="M-10 120 Q120 60 185 150 Q255 250 370 200" fill="none" stroke="#15130F" stroke-width="3" stroke-dasharray="2 14" stroke-linecap="round" opacity=".4"/>
    </svg>

    <!-- Status bar -->
    <div class="statusbar">
      <span>9:41</span>
      <div class="statusbar-icons">
        <i data-lucide="signal"></i>
        <i data-lucide="wifi"></i>
        <i data-lucide="battery-full"></i>
      </div>
    </div>

    <!-- Hero -->
    <div class="hero">

      <!-- Floating chips -->
      <div class="chip chip--light chip-force-free">
        <i data-lucide="shield-check" style="color:#B8860B"></i> Force-Free
      </div>
      <div class="chip chip--dark chip-plus-khanom">
        <i data-lucide="bone"></i> +ขนม
      </div>
      <div class="chip chip--dark chip-create-path">
        <i data-lucide="git-fork"></i> สร้างทางเลือก
      </div>
      <div class="chip chip--light chip-shaping">
        <i data-lucide="wand-2" style="color:#B8860B"></i> Shaping
      </div>
      <div class="chip chip--light chip-plus-toy">
        <i data-lucide="dumbbell" style="color:#B8860B"></i> +ของเล่น
      </div>
      <div class="chip chip--dark chip-no-force">
        <i data-lucide="heart-handshake"></i> ไม่บังคับ
      </div>
      <div class="chip chip--light chip-no-punish">
        <i data-lucide="heart" style="color:#5C8A6B"></i> ไม่ลงโทษ
      </div>

      <!-- Logo -->
      <div class="logo-ring">
        <img src="assets/logo.png" alt="DogBooster">
      </div>
    </div>

    <!-- Bottom sheet -->
    <div class="sheet">
      <div class="sheet-tag">
        <i data-lucide="clipboard-list"></i>
        สุนัขของคุณ Type ไหน มาทำแบบทดสอบกัน
      </div>
      <h1 class="sheet-title">มาสร้างสุนัขนิสัยดี<br>มีความสุขไปด้วยกัน</h1>
      <button class="btn-line" onclick="handleLineLogin()" style="margin-top:22px;">
        <span class="line-mark">L</span>
        เข้าสู่ระบบด้วย LINE
      </button>
      <button onclick="location.href='onboarding.html'" style="margin-top:12px;width:100%;background:transparent;border:1.5px solid rgba(255,255,255,.2);border-radius:16px;font-family:inherit;font-weight:700;font-size:15px;color:#A39B8C;padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
        <i data-lucide="clipboard-list" style="width:16px;height:16px;stroke-width:1.75;"></i>
        ทำแบบประเมินบุคลิกสุนัขก่อน
      </button>
      <div class="trust">
        <div class="trust-item">
          <i data-lucide="shield-check"></i> ปลอดภัย
        </div>
        <div class="trust-dot"></div>
        <div class="trust-item">
          <i data-lucide="heart-handshake"></i> ไม่มีลงโทษ
        </div>
      </div>
    </div>

  </div>

  <script>
    lucide.createIcons();

    /* ===== LINE Login (LIFF) =====
       ขั้นตอนตั้งค่า:
       1. สร้าง LINE Login channel ใน https://developers.line.biz/console/
       2. เพิ่ม LIFF app: Endpoint URL = URL production ของหน้านี้, Scope = profile, openid
       3. คัดลอก LIFF ID (รูปแบบ 1234567890-abcdEfgh) มาวางที่ค่า LIFF_ID ด้านล่าง */
    var LIFF_ID = '2010372666-SryiLU85';

    function liffReady() {
      return typeof LIFF_ID === 'string' && LIFF_ID && LIFF_ID.indexOf('PASTE') === -1;
    }

    /* เรียกหลังล็อกอินสำเร็จ: เก็บโปรไฟล์ แล้วพาไปหน้าถัดไปตามผู้ใช้ใหม่/เก่า */
    async function afterLogin() {
      try {
        var profile = await liff.getProfile();
        localStorage.setItem('db_user', JSON.stringify({
          userId: profile.userId,
          displayName: profile.displayName,
          pictureUrl: profile.pictureUrl
        }));
        /* ลงทะเบียนผู้ใช้กับ backend + ดึงสิทธิเข้าเรียนมา cache (ไม่บล็อกถ้า /api ยังไม่พร้อม) */
        try {
          var idToken = liff.getIDToken();
          var r = await fetch('/api/me', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idToken: idToken })
          });
          if (r.ok) {
            var data = await r.json();
            localStorage.setItem('db_courses', JSON.stringify(data.courses || []));
          }
        } catch (e) { console.error('register /api/me', e); }
        /* ผู้ใช้เก่า (เคยทำ onboarding แล้ว) -> learning-path, ผู้ใช้ใหม่ -> onboarding */
        var onboarded = localStorage.getItem('db_onboarded') === 'true';
        location.href = onboarded ? 'learning-path.html' : 'onboarding.html';
      } catch (err) {
        console.error('getProfile error', err);
      }
    }

    async function initLine() {
      if (!liffReady()) return;
      try {
        await liff.init({ liffId: LIFF_ID });
        /* ถ้ากลับมาจากการ login ของ LINE และล็อกอินอยู่แล้ว -> ไปต่อทันที */
        if (liff.isLoggedIn()) {
          await afterLogin();
        }
      } catch (err) {
        console.error('LIFF init error', err);
      }
    }

    function handleLineLogin() {
      if (!liffReady()) {
        alert('ยังไม่ได้ตั้งค่า LIFF ID — กรุณาใส่ค่า LIFF_ID ใน index.html');
        return;
      }
      if (liff.isLoggedIn()) {
        afterLogin();
      } else {
        /* เด้งไปหน้ายินยอมของ LINE แล้ว redirect กลับมาที่หน้านี้ */
        liff.login({ redirectUri: location.href });
      }
    }

    initLine();
  </script>
</body>
</html>
