<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>DogBooster</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'LINE Seed Sans TH', system-ui, sans-serif;
      background: #15130F; color: #FAF7F1; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
    }
    .loader { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .logo { width: 88px; height: 88px; border-radius: 24px; object-fit: contain; background: #FAF7F1; padding: 10px; }
    .spin {
      width: 26px; height: 26px; border: 3px solid rgba(240,183,76,.25);
      border-top-color: #F0B74C; border-radius: 50%; animation: r .8s linear infinite;
    }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <img class="logo" src="assets/logo.png" alt="DogBooster">
    <div class="spin"></div>
  </div>
  <script>
    // ── Silent LINE login gateway → school.html ──
    var LIFF_ID = '2010372666-SryiLU85';
    var NEXT = 'school.html';

    function go() { location.replace(NEXT); }

    async function afterLogin() {
      try {
        var profile = await liff.getProfile();
        localStorage.setItem('db_user', JSON.stringify({
          userId: profile.userId,
          displayName: profile.displayName,
          pictureUrl: profile.pictureUrl
        }));
        localStorage.setItem('db_lineUserId', profile.userId);
        try {
          var idToken = liff.getIDToken();
          var r = await fetch('/api/me', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idToken: idToken })
          });
          if (r.ok) {
            var data = await r.json();
            localStorage.setItem('db_courses', JSON.stringify(data.courses || []));
          }
        } catch (e) { /* ไม่บล็อกถ้า /api ยังไม่พร้อม */ }
      } catch (e) { /* ignore */ }
      go();
    }

    (async function initLine() {
      var ready = typeof LIFF_ID === 'string' && LIFF_ID && LIFF_ID.indexOf('PASTE') === -1;
      if (!ready || typeof liff === 'undefined') { go(); return; }
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) { await afterLogin(); }
        else { go(); }
      } catch (e) { go(); }
      // กันค้าง: ถ้าอะไรไม่พร้อมภายใน 3 วิ ให้ไปต่อ
      setTimeout(go, 3000);
    })();
  </script>
</body>
</html>
