<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>โปรไฟล์ — DogBooster</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="assets/th-geo.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #F0B74C; --gold-light: #F7CE7E; --gold-dark: #E0A02F;
    --dark: #15130F; --dark2: #1C1A15; --dark3: #3A352D;
    --cream: #FAF7F1; --sand: #E7E2D7; --muted: #A39B8C; --text-body: #48433A;
    --amber: #B8860B;
  }
  html, body {
    font-family: 'LINE Seed Sans TH', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--sand);
    min-height: 100dvh;
  }
  .page {
    max-width: 430px; margin: 0 auto;
    min-height: 100dvh; background: var(--cream);
    display: flex; flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--dark);
    padding: 52px 22px 28px;
    position: relative; overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top: -60px; right: -40px;
    width: 240px; height: 240px; border-radius: 50%;
    background: radial-gradient(circle, rgba(240,183,76,.18), transparent 70%);
    pointer-events: none;
  }
  .back-btn {
    background: none; border: none; cursor: pointer;
    color: var(--cream); display: flex; align-items: center; gap: 8px;
    font-family: inherit; font-size: 14px; font-weight: 700;
    padding: 0; margin-bottom: 20px; position: relative;
  }
  .back-btn svg { width: 20px; height: 20px; }
  .owner-row {
    display: flex; align-items: center; gap: 14px; position: relative;
  }
  .owner-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--dark3); border: 2px solid rgba(240,183,76,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .owner-email { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .owner-label { font-size: 11px; font-weight: 800; color: var(--gold); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 3px; }

  /* Body */
  .body { padding: 24px 20px; flex: 1; display: flex; flex-direction: column; gap: 24px; }

  .sec-title {
    font-size: 11px; font-weight: 800; color: var(--amber);
    letter-spacing: .06em; text-transform: uppercase; margin-bottom: 12px;
    display: flex; align-items: center; gap: 7px;
  }
  .sec-title svg { width: 14px; height: 14px; }

  /* Dog card */
  .dog-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--sand); border-radius: 16px; padding: 14px;
    cursor: pointer; border: 1.5px solid transparent; transition: border-color .15s;
    text-decoration: none;
  }
  .dog-card:hover { border-color: var(--gold); }
  .dog-avatar {
    width: 60px; height: 60px; border-radius: 14px;
    background: #D8D2C8; overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 26px;
  }
  .dog-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .dog-name { font-size: 16px; font-weight: 800; color: var(--dark); }
  .dog-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .dog-type-pill {
    display: inline-flex; align-items: center;
    background: rgba(240,183,76,.15); color: var(--gold-dark);
    font-size: 11px; font-weight: 800; letter-spacing: .06em;
    padding: 3px 10px; border-radius: 100px; margin-top: 6px;
    font-family: ui-monospace, monospace;
  }

  /* Empty state */
  .empty {
    text-align: center; padding: 32px 16px;
    background: var(--sand); border-radius: 16px;
    color: var(--muted); font-size: 14px; line-height: 1.6;
  }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* Buttons */
  .btn-gold {
    width: 100%; background: var(--gold); color: var(--dark);
    border: none; border-radius: 14px;
    font-family: inherit; font-size: 15px; font-weight: 800; padding: 15px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px;
    text-decoration: none;
    box-shadow: 0 8px 20px -8px rgba(240,183,76,.5);
  }
  .btn-gold svg { width: 18px; height: 18px; }
  .btn-outline {
    width: 100%; background: none; color: var(--muted);
    border: 1.5px solid #D8D2C8; border-radius: 14px;
    font-family: inherit; font-size: 14px; font-weight: 700; padding: 13px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-outline svg { width: 16px; height: 16px; }

  /* Owner info card */
  .info-card {
    background: var(--sand); border-radius: 16px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .info-row { display: flex; justify-content: space-between; align-items: center; }
  .info-label { font-size: 12px; color: var(--muted); font-weight: 600; }
  .info-val { font-size: 13px; font-weight: 800; color: var(--dark); }

  /* Student enroll */
  .btn-enroll {
    width: 100%; background: var(--dark); color: var(--gold);
    border: 2px dashed rgba(240,183,76,.4); border-radius: 14px;
    font-family: inherit; font-size: 15px; font-weight: 800; padding: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: border-color .15s, background .15s;
  }
  .btn-enroll:hover { border-color: var(--gold); background: #1C1A15; }
  .btn-enroll svg { width: 18px; height: 18px; }
  .enroll-form {
    background: var(--sand); border-radius: 16px; padding: 16px;
    display: none; flex-direction: column; gap: 12px;
    border: 1.5px solid var(--gold);
  }
  .enroll-form.visible { display: flex; }
  .field-label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
  .enroll-form input, .enroll-form select, .enroll-form textarea {
    width: 100%; background: var(--cream); border: 1.5px solid #D8D2C8; border-radius: 10px;
    padding: 10px 12px; font-family: inherit; font-size: 14px; color: var(--dark); outline: none;
    -webkit-appearance: none; appearance: none;
  }
  .enroll-actions { display: flex; gap: 10px; }
  .btn-sm {
    flex: 1; background: var(--gold); color: var(--dark); border: none; border-radius: 10px;
    font-family: inherit; font-size: 14px; font-weight: 800; padding: 11px; cursor: pointer;
  }
  .btn-sm-outline {
    flex: 1; background: none; color: var(--muted); border: 1.5px solid #D8D2C8; border-radius: 10px;
    font-family: inherit; font-size: 13px; font-weight: 700; padding: 10px; cursor: pointer;
  }
  .student-card { background: var(--dark); border-radius: 16px; padding: 16px; }
  .student-id-row {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,.08); padding-bottom: 12px; margin-bottom: 12px;
  }
  .student-id-label { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
  .student-id-val { font-size: 16px; font-weight: 800; color: var(--gold); font-family: ui-monospace, monospace; letter-spacing: .04em; }
  .student-rows { display: flex; flex-direction: column; gap: 8px; }
  .student-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .student-row-label { font-size: 12px; color: var(--muted); font-weight: 600; flex-shrink: 0; }
  .student-row-val { font-size: 13px; font-weight: 700; color: var(--cream); text-align: right; }
  .no-dog-notice { background: var(--sand); border-radius: 12px; padding: 14px 16px; color: var(--muted); font-size: 13px; text-align: center; }

  /* ---- Responsive frame ---- */
  @media (min-width: 768px) {
    body { padding: 40px 24px; }
    .page {
      max-width: 640px;
      border-radius: 28px;
      overflow: hidden;
      min-height: auto;
      box-shadow: 0 40px 90px -40px rgba(0,0,0,.4);
    }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <button class="back-btn" onclick="history.back()">
      <i data-lucide="arrow-left"></i> กลับ
    </button>
    <div class="owner-row">
      <div style="position:relative;flex-shrink:0;margin-right:14px;">
        <div id="ownerAvatarEl" style="width:56px;height:56px;border-radius:50%;background:var(--dark3);border:2px solid rgba(240,183,76,.4);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;">🧑</div>
        <label for="ownerPhotoInput" style="position:absolute;bottom:-4px;right:-4px;width:22px;height:22px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--dark);">
          <i data-lucide="camera" style="width:11px;height:11px;color:var(--dark);"></i>
        </label>
        <input type="file" id="ownerPhotoInput" accept="image/*" style="display:none;" onchange="changeOwnerPhoto(this)">
      </div>
      <div>
        <div class="owner-label">เจ้าของ</div>
        <div id="ownerNameDisplay" style="font-size:15px;font-weight:800;color:var(--cream);">—</div>
        <div id="syncStatus" style="margin-top:6px;"></div>
      </div>
    </div>
  </div>

  <div class="body">

    <!-- Owner / Student section (merged) -->
    <div>
      <!-- นักเรียน DogBooster -->
      <div id="studentSection">
        <div class="sec-title"><i data-lucide="user"></i> ข้อมูลเจ้าของ</div>
        <div id="noStudentPanel">
          <button class="btn-enroll" onclick="showEnrollForm()">
            <i data-lucide="plus-circle"></i> เพิ่มการเป็นนักเรียนของ DogBooster
          </button>
        </div>
        <div class="enroll-form" id="enrollForm">
          <div>
            <label class="field-label">รหัสนักเรียน</label>
            <input type="text" id="stId" placeholder="เช่น BF2506XXXX" style="font-family:ui-monospace,monospace;letter-spacing:.04em;">
          </div>
          <div>
            <label class="field-label">ชื่อเจ้าของ <span style="color:#D9534F;">*</span></label>
            <input type="text" id="stOwner" placeholder="ชื่อ-นามสกุล">
          </div>
          <div>
            <label class="field-label">เบอร์โทรศัพท์ <span style="color:#D9534F;">*</span></label>
            <input type="text" id="stPhone" placeholder="0XX-XXX-XXXX" inputmode="tel">
          </div>
          <div>
            <label class="field-label">จังหวัด <span style="color:#D9534F;">*</span></label>
            <select id="stProvince" onchange="onProvinceChange()">
              <option value="">— เลือกจังหวัด —</option>
            </select>
          </div>
          <div>
            <label class="field-label">เขต / อำเภอ <span style="color:#D9534F;">*</span></label>
            <select id="stDistrict">
              <option value="">— เลือกจังหวัดก่อน —</option>
            </select>
          </div>
          <div class="enroll-actions">
            <button class="btn-sm" onclick="saveEnroll()">บันทึก</button>
            <button class="btn-sm-outline" onclick="hideEnrollForm()">ยกเลิก</button>
          </div>
        </div>
        <div class="student-card" id="studentCard" style="display:none;">
          <div class="student-id-row">
            <span class="student-id-label">รหัสนักเรียน</span>
            <span class="student-id-val" id="stIdDisplay"></span>
          </div>
          <div class="student-rows" id="studentRows"></div>
          <button class="btn-sm-outline" style="margin-top:14px;width:100%;" onclick="editEnroll()">
            <i data-lucide="pencil"></i> แก้ไขข้อมูล
          </button>
        </div>
      </div>
    </div>

    <!-- Dogs section -->
    <div>
      <div class="sec-title"><i data-lucide="dog"></i> สุนัขของฉัน</div>
      <div id="dogListEl" style="display:flex;flex-direction:column;gap:10px;"></div>
    </div>

    <!-- Add new dog -->
    <a href="onboarding.html" class="btn-gold">
      <i data-lucide="plus-circle"></i> เพิ่มสุนัขตัวใหม่
    </a>

    <!-- Reset -->
    <button class="btn-outline" onclick="confirmReset()">
      <i data-lucide="trash-2"></i> ล้างข้อมูลทั้งหมด
    </button>

  </div>
</div>

<script>
function loadProfile() {
  const owner = JSON.parse(localStorage.getItem('db_owner') || 'null');
  const dogs  = JSON.parse(localStorage.getItem('db_dogs') || '[]');

  // Owner header + card
  const name = (owner && owner.name) || '—';
  document.getElementById('ownerNameDisplay').textContent = name;

  // Owner avatar
  const ownerPhoto = localStorage.getItem('db_ownerPhoto');
  const avatarEl = document.getElementById('ownerAvatarEl');
  if (ownerPhoto) avatarEl.innerHTML = `<img src="${ownerPhoto}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
  else avatarEl.textContent = '🧑';

  // LINE sync status
  const lineUserId = localStorage.getItem('db_lineUserId');
  const syncEl = document.getElementById('syncStatus');
  if (lineUserId) {
    syncEl.innerHTML = '<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#06C755;font-weight:700;"><span style="width:7px;height:7px;border-radius:50%;background:#06C755;display:inline-block;"></span>ซิงค์กับ LINE แล้ว</span>';
  } else {
    syncEl.innerHTML = '<a href="login.html" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:800;color:var(--gold);text-decoration:none;background:rgba(240,183,76,.12);padding:4px 10px;border-radius:100px;">ล็อกอิน LINE เพื่อซิงค์ข้อมูล</a>';
  }

  // Student section (owner-level)
  const st = owner && owner.student;
  if (st && st.id) {
    document.getElementById('noStudentPanel').style.display = 'none';
    showStudentCard(st);
  } else {
    document.getElementById('noStudentPanel').style.display = '';
    document.getElementById('studentCard').style.display = 'none';
  }

  // Dog list
  const listEl = document.getElementById('dogListEl');
  if (dogs.length === 0) {
    listEl.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🐾</div>
        ยังไม่มีสุนัข<br>กด "เพิ่มสุนัขตัวใหม่" เพื่อเริ่มทำแบบประเมิน
      </div>`;
    return;
  }

  dogs.forEach(dog => {
    const card = document.createElement('a');
    card.className = 'dog-card';
    card.href = 'dog-detail.html?id=' + dog.id;
    card.innerHTML = `
      <div class="dog-avatar">${dog.photo ? `<img src="${dog.photo}" alt="${dog.name}">` : '🐾'}</div>
      <div style="flex:1;min-width:0;">
        <div class="dog-name">${dog.name}</div>
        <div class="dog-meta">${[dog.breed, dog.age, dog.gender].filter(Boolean).join(' · ')}</div>
        ${dog.type ? `<div class="dog-type-pill">${dog.type}</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
        <button onclick="event.preventDefault();event.stopPropagation();deleteDog('${dog.id}')" style="background:none;border:none;cursor:pointer;color:#D9534F;padding:6px;display:flex;align-items:center;border-radius:8px;">
          <i data-lucide="trash-2" style="width:18px;height:18px;"></i>
        </button>
        <span style="font-size:18px;color:var(--muted);"><i data-lucide="chevron-right"></i></span>
      </div>
    `;
    listEl.appendChild(card);
  });
}

// ── Thai province / district dropdowns ──
function populateProvinces(selectedProvince) {
  var sel = document.getElementById('stProvince');
  if (!sel || !window.TH_GEO) return;
  var opts = '<option value="">— เลือกจังหวัด —</option>';
  TH_GEO.provinces.forEach(function(p) {
    opts += '<option value="' + p.c + '"' + (String(selectedProvince) === String(p.c) ? ' selected' : '') + '>' + p.n + '</option>';
  });
  sel.innerHTML = opts;
}

function populateDistricts(provinceCode, selectedDistrict) {
  var sel = document.getElementById('stDistrict');
  if (!sel || !window.TH_GEO) return;
  var list = (TH_GEO.amphures[String(provinceCode)]) || [];
  if (!provinceCode || list.length === 0) {
    sel.innerHTML = '<option value="">— เลือกจังหวัดก่อน —</option>';
    return;
  }
  var opts = '<option value="">— เลือกเขต/อำเภอ —</option>';
  list.forEach(function(d) {
    opts += '<option value="' + d + '"' + (selectedDistrict === d ? ' selected' : '') + '>' + d + '</option>';
  });
  sel.innerHTML = opts;
}

function onProvinceChange() {
  populateDistricts(document.getElementById('stProvince').value, '');
}

function provinceName(code) {
  if (!window.TH_GEO) return '';
  var p = TH_GEO.provinces.find(function(x){ return String(x.c) === String(code); });
  return p ? p.n : '';
}

function changeOwnerPhoto(input) {
  var file = input.files[0];
  if (!file) return;
  var img = new Image();
  var reader = new FileReader();
  reader.onload = function(e) {
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var maxPx = 300, q = 0.7;
      var w = img.width, h = img.height;
      if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
      else { w = Math.round(w * maxPx / h); h = maxPx; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      var compressed = canvas.toDataURL('image/jpeg', q);
      try { localStorage.setItem('db_ownerPhoto', compressed); } catch(e) {}
      var avatarEl = document.getElementById('ownerAvatarEl');
      avatarEl.innerHTML = '<img src="' + compressed + '" style="width:100%;height:100%;object-fit:cover;display:block;">';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function deleteDog(id) {
  if (!confirm('ลบโปรไฟล์สุนัขตัวนี้ใช่ไหม?')) return;
  let dogs = JSON.parse(localStorage.getItem('db_dogs') || '[]');
  dogs = dogs.filter(d => d.id !== id);
  localStorage.setItem('db_dogs', JSON.stringify(dogs));
  if (localStorage.getItem('db_activeDogId') === id) localStorage.removeItem('db_activeDogId');
  loadProfile();
}

function confirmReset() {
  if (confirm('ล้างข้อมูลทั้งหมดใช่ไหม? ไม่สามารถกู้คืนได้')) {
    localStorage.removeItem('db_owner');
    localStorage.removeItem('db_dogs');
    localStorage.removeItem('db_activeDogId');
    location.href = 'onboarding.html';
  }
}

// ── Student enrollment (owner-level) ──
function generateStudentId() {
  var now = new Date();
  var yy = String(now.getFullYear()).slice(-2);
  var mm = String(now.getMonth() + 1).padStart(2, '0');
  var rand = String(Math.floor(Math.random() * 9000) + 1000);
  return 'DB' + yy + mm + rand;
}

function showStudentCard(st) {
  document.getElementById('studentCard').style.display = 'block';
  document.getElementById('stIdDisplay').textContent = st.id;
  document.getElementById('studentRows').innerHTML = [
    ['ชื่อเจ้าของ', st.owner || '—'],
    ['เบอร์โทร', st.phone || '—']
  ].map(r => '<div class="student-row"><span class="student-row-label">' + r[0] + '</span><span class="student-row-val">' + r[1] + '</span></div>').join('');
  lucide.createIcons();
}

function showEnrollForm() {
  document.getElementById('noStudentPanel').style.display = 'none';
  document.getElementById('enrollForm').classList.add('visible');
  const owner = JSON.parse(localStorage.getItem('db_owner') || 'null');
  const st = (owner && owner.student) || {};
  document.getElementById('stId').value = st.id || '';
  document.getElementById('stOwner').value = st.owner || (owner && owner.name) || '';
  document.getElementById('stPhone').value = st.phone || '';
  populateProvinces(st.provinceCode || '');
  populateDistricts(st.provinceCode || '', st.district || '');
  lucide.createIcons();
}

function hideEnrollForm() {
  document.getElementById('enrollForm').classList.remove('visible');
  const owner = JSON.parse(localStorage.getItem('db_owner') || 'null');
  const st = owner && owner.student;
  if (st && st.id) {
    showStudentCard(st);
  } else {
    document.getElementById('noStudentPanel').style.display = '';
  }
}

function editEnroll() {
  document.getElementById('studentCard').style.display = 'none';
  showEnrollForm();
}

function saveEnroll() {
  const stId  = document.getElementById('stId').value.trim();
  const owner = document.getElementById('stOwner').value.trim();
  const phone = document.getElementById('stPhone').value.trim();
  const provinceCode = document.getElementById('stProvince').value;
  const district = document.getElementById('stDistrict').value;
  if (!owner || !phone || !provinceCode || !district) { alert('กรุณากรอก ชื่อเจ้าของ เบอร์โทรศัพท์ จังหวัด และเขต/อำเภอ ให้ครบ'); return; }

  const ownerData = JSON.parse(localStorage.getItem('db_owner') || '{}');
  const existing = ownerData.student || {};
  ownerData.student = {
    id: stId,
    owner, phone,
    provinceCode: provinceCode || '',
    province: provinceName(provinceCode),
    district: district || '',
    enrollDate: existing.enrollDate || new Date().toISOString().slice(0, 10)
  };
  // ชื่อเจ้าของ = ชื่อเจ้าของโปรไฟล์ (รวมกัน) — เก็บชื่อแรก
  ownerData.name = owner.split(/\s+/)[0];
  localStorage.setItem('db_owner', JSON.stringify(ownerData));
  document.getElementById('ownerNameDisplay').textContent = ownerData.name;

  document.getElementById('enrollForm').classList.remove('visible');
  showStudentCard(ownerData.student);

  const lineUserId = localStorage.getItem('db_lineUserId');
  if (lineUserId) syncStudent(ownerData.student, lineUserId);
}

async function syncStudent(st, lineUserId) {
  try {
    await fetch('/api/students', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lineUserId, studentId: st.id, owner: st.owner, phone: st.phone, province: st.province, district: st.district, enrollDate: st.enrollDate })
    });
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  const init = () => { if (window.lucide) { lucide.createIcons(); loadProfile(); } else { setTimeout(init, 80); } };
  init();
});
</script>
